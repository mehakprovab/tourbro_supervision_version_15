<app-home-page-header></app-home-page-header>
<div class="common-sec-faq">
    <div class="container">
      <h2 class="text-center comon-head-m"> Agent FAQs</h2>
      <div class="row">
          <div class="col-md-12">
          <div class="card">
              <div class="card-body nopad">
                 <!-- ngb Accordion starts -->
                 <div class="accordion-shadow">
                 <ngb-accordion  (panelChange)='panelShadow($event)' activeIds="panel1" #shadow>
                  <ng-container *ngFor="let item of respData" >
                     <ng-container >
                  <ngb-panel id="panel1"[id]="item.id" >
                       <ng-template ngbPanelTitle>
                          <div class="iterheader">
                              <span>  <span>{{item['question']}}</span></span>
                          </div>
                       </ng-template>
                       <ng-template ngbPanelContent>
                        {{item.answer}}
                       </ng-template>
                    </ngb-panel>
                    </ng-container>
                    </ng-container>
                  
                    
                 </ngb-accordion>
                 <!-- ngb Accordion ends -->
               </div>
             </div>
           </div>
          </div>
       </div>
     </div>
  </div>
  
  
  <app-home-page-footer></app-home-page-footer>
