<div class="rangebox">
    <button data-target="#collapse501" data-toggle="collapse" class="collapsebtn" type="button">Price ({{currency}})</button>
    <div id="collapse501" class="collapse show" style="clear: both;">
        <a *ngIf="activityCopy.length" style="cursor: pointer;font-size: 12px;" class="float-right"
                (click)="clearPriceFilter()">Clear</a>
        <div class="price_slider1">
            <span *ngIf="activityCopy.length"  class="lable-slider">
                <ngx-slider [(value)]="minValue" [(highValue)]="maxValue" [options]="options"
                (valueChange)="valueChange($event)" (highValueChange)="highValueChange($event)"></ngx-slider>
            </span>
        </div>
    </div>
</div>
