<div class="rangebox" *ngIf="regConfig.get('amenities')['controls'].length>0">
    <button data-target="#collapse511" data-toggle="collapse" class="collapsebtn" type="button">Amenities</button>
    <!-- <a style="cursor: pointer;font-size: 12px;" class="float-right" (click)="clearFilter()">Clear</a> -->
    <form [formGroup]="regConfig" style="clear: both;">
        <div id="collapse511" class="collapse show">
            <div class="boxins" id="allairlines">
                <ul class="locationul">
                    <ng-container formArrayName="amenities">
                        <ng-container *ngFor="let item of amenitiesArray; index as i"
                            [formGroupName]="i">
                            <li>
                                <div class="squaredThree">
                                    <input formControlName="isChecked"
                                        (change)="filterByAmenities($event.target.checked, item.get('name').value)"
                                        type="checkbox" name="check" class="airlinecheckbox"
                                        id="{{item.get('name').value}}">
                                    <label for="{{item.get('name').value}}"></label>
                                </div>
                                <label for="{{item.get('name').value}}" class="lbllbl">{{ item.get('name').value
                                    }}</label>
                            </li>
                        </ng-container>
                    </ng-container>
                    
                </ul>
                <button class="btn btn-link col-12 d-flex p-0 ms-2 justify-content-end showamenities" (click)="toggleAmenities()">
                        {{ showAllAmenities ? 'Show less' : 'Show more' }}
                    </button>
            </div>
        </div>
    </form>
</div>
