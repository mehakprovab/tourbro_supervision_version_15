<!-- <p>hotel-accomodation-filter works!</p> -->
<div class="rangebox">
    <button data-target="#collapse512" data-toggle="collapse" class="collapsebtn" type="button">Accomodation</button>
    <!-- <a style="cursor: pointer;font-size: 12px;" class="float-right" (click)="clearStopoverCityFilter()">Clear</a> -->
    <form [formGroup]="stopoversForm" style="clear: both;">
        <div id="collapse512" class="collapse show">
            <div class="boxins" id="allairlines">
                <ul formArrayName="items" class="locationul">
                    <li *ngFor="let stopover of stopovers; let i = index">
                        <div class="squaredThree">
                            <input [formControlName]="i" [value]="stopover.name" (change)="filterByStopoverCity()" type="checkbox" name="check" class="airlinecheckbox" id="Stopover{{i + 1}}">
                            <label for="Stopover{{i + 1}}"></label>
                        </div>
                        <label for="Stopover{{i + 1}}" class="lbllbl">{{ stopover.name }}</label>
                    </li>
                </ul>
            </div>
        </div>
    </form>
</div>
