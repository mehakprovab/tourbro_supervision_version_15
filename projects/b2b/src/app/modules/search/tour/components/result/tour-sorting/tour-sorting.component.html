<div class="tours-filt">
    <div class="row">
        <div class="col shw_rslt">
            <h4>Showing {{tourList.length}} Results</h4>
        </div>
        <div class="col-6">
            <input type="text"  name="filter"  #searchInputRef class="form-control dashb-filter search-input text-capitalize"
            placeholder="Search" (input)="searchTour($event.target.value)">
        </div>
        <div class="col">
            <div class="styled-select-filters">
                <select name="sort_price" id="sort_price" (change)="onSortSelectionChange($event.target.value)">
                  <option value="" selected="">Sort by price</option>
                  <option value="asc_price">Lowest price</option>
                  <option value="desc_price">Highest price</option>
                </select>
              </div>
            
        </div>

    </div>

</div>
