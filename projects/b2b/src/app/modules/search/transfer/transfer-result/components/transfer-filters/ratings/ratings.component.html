<div class="rangebox">
    <button data-target="#collapseRatigs" data-toggle="collapse" class="collapsebtn" type="button">Supplier Trustpilot
        Rating</button>
    <form [formGroup]="regConfig" style="clear: both;" *ngIf="transfer && transfer.length>0">
        <div id="collapseRatigs" class="collapse show">
            <div class="boxins" id="allairlines">
                <ul class="locationul">
                    <ng-container formArrayName="ratings">
                        <ng-container *ngFor="let item of regConfig.get('ratings')['controls']; index as i"
                            [formGroupName]="i">
                            <li>
                                <div class="squaredThree">
                                    <input formControlName="isChecked"
                                        (change)="filterByRatings($event.target.checked, item.get('value').value)"
                                        type="checkbox" name="check" class="airlinecheckbox"
                                        [checked]="item.get('isChecked').value" id="{{item.get('name').value}}">
                                    <label for="{{item.get('name').value}}"></label>
                                </div>
                                <label for="{{item.get('name').value}}" class="lbllbl">{{ item.get('name').value
                                    }}</label>
                            </li>
                        </ng-container>
                    </ng-container>
                </ul>
            </div>
        </div>
    </form>
</div>
