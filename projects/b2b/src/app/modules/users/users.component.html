<div class="row">
    <div class="col-md-12">
        <div class="card main-card mb-6">
            <div class="card-body">

                <ul ngbNav #nav="ngbNav" class="nav-tabs">
                    <li [ngbNavItem]="1">
                        <a ngbNavLink>List Users</a>
                        <ng-template ngbNavContent>
                            <app-users-list></app-users-list>
                        </ng-template>
                    </li>

                    <li [ngbNavItem]="2">
                        <a ngbNavLink>Add User</a>
                        <ng-template ngbNavContent>
                            <app-users-add></app-users-add>
                        </ng-template>
                    </li>
                </ul>

                <div [ngbNavOutlet]="nav" class="mt-2"></div>

            </div>
        </div>
    </div>
</div>
