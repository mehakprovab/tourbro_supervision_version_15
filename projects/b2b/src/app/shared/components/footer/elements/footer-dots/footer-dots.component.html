<div class="footer-dots">

  <!-- ===================== NOTIFICATIONS DROPDOWN ===================== -->
  <div class="btn-group" ngbDropdown autoClose="outside" placement="top-left">

    <button type="button"
            class="btn btn-link dot-btn-wrapper dropdown-toggle-no-caret"
            ngbDropdownToggle>
      <span>
        <i class="dot-btn-icon lnr-bullhorn icon-gradient bg-mean-fruit"></i>
        <div class="badge badge-dot badge-abs badge-dot-sm badge-danger">
          Notifications
        </div>
      </span>
    </button>

    <div class="dropdown-menu-xl" ngbDropdownMenu>

      <div class="dropdown-menu-header mb-0">
        <div class="dropdown-menu-header-inner bg-deep-blue">
          <div class="menu-header-image opacity-1 dd-header-bg-2"></div>
          <div class="menu-header-content text-dark">
            <h5 class="menu-header-title">Notifications</h5>
            <h6 class="menu-header-subtitle">
              You have <b>21</b> unread messages
            </h6>
          </div>
        </div>
      </div>

      <!-- ===================== NAV TABS ===================== -->
      <div class="nav-justified">
        <div class="card-tabbed-header">

          <ul ngbNav
              #footerTabs="ngbNav"
              class="nav-tabs tabs-animated custom_tab nav-justified"
              [(activeId)]="activeTab">

            <!-- MESSAGES -->
            <li ngbNavItem="messages">
              <a ngbNavLink>Messages</a>

              <ng-template ngbNavContent>
                <div class="scroll-gradient">
                  <div class="scroll-area-sm shadow-overflow">

                    <perfect-scrollbar [autoPropagation]="true">

                      <div class="vertical-time-simple vertical-without-time vertical-timeline vertical-timeline--animate vertical-timeline--one-column">

                        <div class="vertical-timeline-item">
                          <div>
                            <span class="vertical-timeline-element-icon bounce-in"></span>
                            <div class="vertical-timeline-element-content bounce-in">
                              <h4 class="timeline-title">All Hands Meeting</h4>
                            </div>
                          </div>
                        </div>

                        <div class="vertical-timeline-item">
                          <div>
                            <span class="vertical-timeline-element-icon bounce-in"></span>
                            <div class="vertical-timeline-element-content bounce-in">
                              <p>Another meeting today at <b class="text-danger">12:00 PM</b></p>
                            </div>
                          </div>
                        </div>

                      </div>

                    </perfect-scrollbar>

                  </div>
                </div>
              </ng-template>
            </li>

            <!-- EVENTS -->
            <li ngbNavItem="events">
              <a ngbNavLink>Events</a>

              <ng-template ngbNavContent>
                <div class="scroll-gradient">
                  <div class="scroll-area-sm shadow-overflow">

                    <perfect-scrollbar [autoPropagation]="true">

                      <div class="vertical-without-time vertical-timeline vertical-timeline--animate vertical-timeline--one-column">

                        <div class="vertical-timeline-item">
                          <div>
                            <span class="vertical-timeline-element-icon bounce-in"></span>

                            <div class="vertical-timeline-element-content bounce-in">
                              <h4 class="timeline-title">Event Example</h4>
                              <p>Meeting at <a [routerLink]="[]">12:00 PM</a></p>
                            </div>

                          </div>
                        </div>

                      </div>

                    </perfect-scrollbar>

                  </div>
                </div>
              </ng-template>
            </li>

            <!-- STATUS -->
            <li ngbNavItem="status">
              <a ngbNavLink>Status</a>

              <ng-template ngbNavContent>
                <div class="no-results">

                  <div class="swal2-icon swal2-success swal2-animate-success-icon">
                    <div class="swal2-success-ring"></div>
                  </div>

                  <div class="results-subtitle">All caught up!</div>
                  <div class="results-title">There are no system errors!</div>

                </div>
              </ng-template>
            </li>

          </ul>

          <!-- NAV OUTLET (Angular 15 safe) -->
          <div [ngbNavOutlet]="footerTabs"></div>

        </div>

        <ul class="nav flex-column">
          <li class="nav-item-divider nav-item mt-0"></li>

          <li class="nav-item-btn text-center nav-item">
            <button class="btn-shadow btn-wide btn-pill btn btn-focus btn-sm">
              View Latest Changes
            </button>
          </li>
        </ul>

      </div>
    </div>
  </div>

  <div class="dots-separator"></div>

  <!-- ===================== LANGUAGE DROPDOWN ===================== -->
  <div class="btn-group" ngbDropdown autoClose="outside" placement="top-left">

    <button type="button"
            class="btn btn-link dot-btn-wrapper dropdown-toggle-no-caret"
            ngbDropdownToggle>
      <span>
        <i class="dot-btn-icon lnr-earth icon-gradient bg-happy-itmeo"></i>
      </span>
    </button>

    <div ngbDropdownMenu>

      <div class="dropdown-menu-header">
        <div class="dropdown-menu-header-inner pt-4 pb-4 bg-focus">
          <div class="menu-header-content text-center text-white">
            <h6 class="menu-header-subtitle mt-0">Choose Language</h6>
          </div>
        </div>
      </div>

      <button type="button" class="dropdown-item">USA</button>
      <button type="button" class="dropdown-item">Switzerland</button>
      <button type="button" class="dropdown-item">France</button>
      <button type="button" class="dropdown-item">Spain</button>

    </div>
  </div>

  <div class="dots-separator"></div>

  <!-- ===================== STATUS DROPDOWN ===================== -->
  <div class="btn-group" ngbDropdown autoClose="outside" placement="top-left">

    <button type="button"
            class="btn btn-link dot-btn-wrapper dropdown-toggle-no-caret"
            ngbDropdownToggle>
      <span>
        <i class="dot-btn-icon lnr-pie-chart icon-gradient bg-love-kiss"></i>
        <div class="badge badge-dot badge-abs badge-dot-sm badge-warning">
          Notifications
        </div>
      </span>
    </button>

    <div class="dropdown-menu-xl" ngbDropdownMenu>

      <div class="dropdown-menu-header">
        <div class="dropdown-menu-header-inner bg-premium-dark">
          <div class="menu-header-content text-white">
            <h5 class="menu-header-title">Users Online</h5>
          </div>
        </div>
      </div>

      <div class="widget-chart">
        <div class="widget-chart-content">
          <div class="widget-numbers">
            <span>344k</span>
          </div>
        </div>
      </div>

      <ul class="nav flex-column">
        <li class="nav-item-divider mt-0 nav-item"></li>

        <li class="nav-item-btn text-center nav-item">
          <button class="btn btn-warning btn-sm btn-pill btn-wide">
            Refresh List
          </button>
        </li>
      </ul>

    </div>
  </div>

</div>
