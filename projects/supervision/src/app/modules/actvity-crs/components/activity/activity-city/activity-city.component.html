<div class="entireScreen  p-0 col-md-12 col-lg-12">
    <div class="col-12 row">
        <div class="heading col-6">
            <p>Activity City</p>
            <button *ngIf="!editForm" class="orangeButton" type="submit" (click)="onAddButtonClicked()">Add</button>
        </div>
        <div class="form-group mb-0 col-sm-6 col-6 p-0 float-right has-search d-flex justify-content-end">
            <div class="col-6 pt-3">
                <span class="fa fa-search form-control-feedback"></span>
                <input class="form-control" type="text" name="Search" [(ngModel)]="searchText"
                    autocomplete="off" placeholder="Search">
            </div>
            
        </div>
    </div>
    
    <div class="card" *ngIf="enabledForm && !editForm">
        <form [formGroup]="addCityForm" (ngSubmit)="saveTextTitle === 'Update' ? updateCity() : onActivityCitySave()">
            <div class="form-row">
                <div class="col-4 pr-0">
                    <div class="form-group">
                        <label for="themeType">Country</label>
                        <select formControlName="country_name" class="form-control"
                            (change)="getActivityCityList($event)">
                            <option value="" disabled selected>Select Country</option>
                            <option id="autocomplete" *ngFor="let country of countryList" [value]="country.id">
                                {{country.CountryName}}
                            </option>
                        </select>
                        <div *ngIf="submittedVehicle && f.country_name.errors" class="invalid-feedback">
                            <div *ngIf="f.country_name.errors.required">Country is required</div>
                        </div>
                    </div>
                </div>

                <div class="col-4 pr-0">
                    <div class="form-group">
                        <label for="themeType">City Name</label>
                        <!-- <input type="text" class="form-control  form-control-sm nrm_input" 
                            placeholder="Enter Activity City" id="appReference"formControlName="city_name" maxlength="150"> -->

                            <input placeholder="City Name" type="text" class="validate text-capitalize searchinput form-control  form-control-sm nrm_input"
                                    (keyup)="getAutoCompleteLocations($event)" for="dynmicLocations"
                                    formControlName="city_name"
                                    #destination_name>
                                <ul class="droplocations" id="dynmicLocations">
                                    <li *ngFor="let location of countryListSelect" (click)="selectedLocation(location)">
                                        {{location.CityName}} <span>({{location.CountryName}})</span></li>
                                </ul>
                    </div>
                    <div *ngIf="submittedVehicle && f.city_name.errors" class="invalid-feedback">
                        <div *ngIf="f.city_name.errors.required">City is required</div>
                    </div>
                </div>
            </div>
            <div class="saveButton">
                <button type="submit" class="orangeButton"> {{saveTextTitle}}</button>
            </div>
        </form>
    </div>

</div>
<div class="entireScreen">
    <div class="wrapper1" id="notifications-list" (scroll)="scrollTwo.scrollLeft = scrollOne.scrollLeft" #scrollOne >
        <div class="div1"></div>
   </div>
    <div class="wrapper2" #scrollTwo (scroll)="scrollOne.scrollLeft = scrollTwo.scrollLeft">
        <div *ngIf="!editForm" class="div2 invisible-scrollbar">
            <div class="table-responsive">
                <table class="table table-borderless table-striped table-hover" matSort (matSortChange)="sortData($event)">
                    <thead>
                        <tr class="p-2">
                        <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn" mat-sort-header="{{header}}">
                            {{ header }}
                        </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngIf="searchSpin">
                            <td colspan="12">
                                <mat-spinner [diameter]="30" style="margin:0 auto;"
                                    mode="indeterminate"></mat-spinner>
                            </td>
                        </tr>
                        <tr *ngIf="!searchSpin && !activityCityDataList.length">
                            <td colspan="11">
                                <h4 class="text-muted text-center">
                                    No Data Found!
                                </h4>
                            </td>
                        </tr>
                        <tr *ngFor="let item of activityCityDataList | filter:searchText | slice: (page - 1) * pageSize : (page - 1) * pageSize + pageSize; let i=index">
                                <td class="text-left text-muted">{{'#' + (i+1) }}</td>
                                <td class="text-left">{{ item.CountryName }}</td>
                                <td class="text-left">{{ item.CityName }}</td>
                                <td class="text-left buttontdsize" *ngIf="loggedInUser.auth_role_id !== 7">
                                    <button  class="btn btn-sm btn-primary mr-1" (click)="onEditCity(item.origin)">{{'Edit'}}
                                    </button>
                                    <button class="btn btn-sm btn-primary mr-1" (click)="onDeletedRecord(item)"> {{'Delete'}}  </button>
                                </td>
                        </tr>
                    </tbody>
                </table>
                <div class="card-footer pb-0">
                    <div class="d-flex w-100 justify-content-between">
                        <ngb-pagination [collectionSize]="collectionSize" [(page)]="page" [maxSize]="5" [pageSize]="pageSize">
                        </ngb-pagination>
                        <select class="custom-select" style="width: auto" name="pageSize" [(ngModel)]="pageSize">
                            <option [ngValue]="20">20 items per page</option>
                            <option [ngValue]="50">50 items per page</option>
                            <option [ngValue]="100">100 items per page</option>
                            <option [ngValue]="150">150 items per page</option>
                            <option [ngValue]="200">200 items per page</option>
                            <option [ngValue]="500">500 items per page</option>
                            <option [ngValue]="700">700 items per page</option>
                            <option [ngValue]="1000">1000 items per page</option>
                        </select>
                    </div>
                </div>
            </div>
            </div>
    </div>
</div>
