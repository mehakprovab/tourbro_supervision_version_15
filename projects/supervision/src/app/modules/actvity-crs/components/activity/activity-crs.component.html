
<ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange($event)" #tabs
[activeId]="activeIdString">
    <ngb-tab id="list_activitycrs_list">
        <ng-template ngbTabTitle>
            <span class="">{{'List Activity'}}</span>
        </ng-template>
        <ng-template ngbTabContent>
            <app-list-activity-crs (toUpdate)="triggerTab($event)"></app-list-activity-crs>
        </ng-template>
    </ngb-tab>
    <ngb-tab id="add_activitycrs">
        <ng-template ngbTabTitle>
            <span class="">{{'Create Activity'}}</span>
        </ng-template>
        <ng-template ngbTabContent>
            <app-add-activity-crs (someEvent)="triggerTab($event)"></app-add-activity-crs>
        </ng-template>
    </ngb-tab>
</ngb-tabset>
