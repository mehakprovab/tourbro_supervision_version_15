<div class="card adminInner">

    <div class="card-header mb-3">
        <h5>Activity Type</h5>
        <!-- <button *ngIf="!editForm" class="orangeButton" type="submit" (click)="onAddButtonClicked()">Add</button> -->
    </div>

    <div class="" *ngIf="enabledForm && !editForm">
        <form [formGroup]="activityTypeForm" (ngSubmit)="onActivityTypeSave()">
            <div class="form-row">
                <div class="col-4 pr-0">
                    <div class="form-group">
                        <label for="themeType">Activity Type</label>
                        <input type="text" class="form-control  form-control-sm nrm_input"
                            placeholder="Enter Activity Type" id="appReference" formControlName="activity_type_name"
                            maxlength="150">
                    </div>
                </div>

                <!-- <div class="col-4">
                    <div class="form-group">
                        <label class="col-sm-3 control-label" for="status">
                            Status
                            <span class="text-danger">*</span>
                        </label>
                        <div class="col-4">
                            <span title="Slide for Active/Deactive">
                                <mat-slide-toggle class="example-margin" formControlName="status"
                                   >
                                </mat-slide-toggle>
                            </span>
                        </div>
                        
                    </div>
                </div> -->
                <div class="saveButton form-group ml-2 mb-0">
                     <label>&nbsp;</label>
                    <button type="submit" class="btn btn-primary"> {{saveTextTitle}}</button>
                </div>
            </div>

        </form>
    </div>

   <div class="form-group mb-0 col-sm-12 pb-3 float-right">
    <div class="d-flex justify-content-end align-items-center">
     
        <div>
             Full text search:
            <input class="form-control ml-0" type="text" name="Search" [(ngModel)]="searchText" autocomplete="off"
            placeholder="Search">
        </div>
        
    </div>
       
   </div>

    <div class="entireScreen">

        <div class="wrapper1" id="notifications-list" (scroll)="scrollTwo.scrollLeft = scrollOne.scrollLeft" #scrollOne>
            <div class="div1"></div>
        </div>
        <div class="wrapper2" #scrollTwo (scroll)="scrollOne.scrollLeft = scrollTwo.scrollLeft">
            <div *ngIf="!editForm" class="div2 invisible-scrollbar">
                <div class="table-responsive">
                    <table class="table table-borderless table-striped table-hover" matSort
                        (matSortChange)="sortData($event)">
                        <thead>
                            <tr class="p-2">
                                <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn"
                                    mat-sort-header="{{header}}">
                                    {{ header }}
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngIf="searchSpin">
                                <td colspan="12">
                                    <mat-spinner [diameter]="30" style="margin:0 auto;"
                                        mode="indeterminate"></mat-spinner>
                                </td>
                            </tr>
                            <tr *ngIf="!searchSpin && !activityTypeDataList.length">
                                <td colspan="11">
                                    <h4 class="text-muted text-center">
                                        No Data Found!
                                    </h4>
                                </td>
                            </tr>
                            <tr
                                *ngFor="let item of activityTypeDataList | filter:searchText | slice: (page - 1) * pageSize : (page - 1) * pageSize + pageSize; let i=index">
                                <td class="text-left text-muted">{{(i+1) }}</td>
                                <td class="text-left">
                                    <span title="Slide for Active/Deactive">
                                        <mat-slide-toggle
                                            [disabled]="!showActionButtons(item.auth_role, item.created_by_id)"
                                            class="example-margin" [(ngModel)]="item.status"
                                            (change)="statusUpdateType($event, item.id)">
                                        </mat-slide-toggle>
                                    </span>
                                </td>
                                <td class="text-left">{{ item.activity_type_name }}</td>
                                <td *ngIf="showActionButtons(item.auth_role,item.created_by_id)"
                                    class="text-left buttontdsize">
                                    <button class="btn btn-sm btn-primary mr-1" (click)="onEditType(item.id)">{{'Edit'}}
                                    </button>
                                    <button class="btn btn-sm btn-secondary" (click)="onDeletedRecord(item)">
                                        {{'Delete'}} </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="card-footer pb-0">
                        <div class="d-flex w-100 justify-content-between">
                            <ngb-pagination [collectionSize]="collectionSize" [(page)]="page" [maxSize]="5"
                                [pageSize]="pageSize">
                            </ngb-pagination>
                            <select class="custom-select" style="width: auto" name="pageSize" [(ngModel)]="pageSize">
                                <option [ngValue]="100">100 items per page</option>
                                <option [ngValue]="150">150 items per page</option>
                                <option [ngValue]="200">200 items per page</option>
                                <option [ngValue]="500">500 items per page</option>
                                <option [ngValue]="700">700 items per page</option>
                                <option [ngValue]="1000">1000 items per page</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>
