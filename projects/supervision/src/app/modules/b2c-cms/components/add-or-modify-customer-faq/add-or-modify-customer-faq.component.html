<div class="">
    <div class="">
        <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange(false)" #tabs
            [activeId]="activeIdString">
            <ngb-tab id="add_update_staticPage">
                <ng-template ngbTabTitle>
                    <span>Customer FAQ Page Content</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-add-update-customer-faq (staticContentTab)="triggerTab($event)"></app-add-update-customer-faq>
                </ng-template>
            </ngb-tab>
            <ngb-tab id="staticpage_list">
                <ng-template ngbTabTitle>
                    <span> Customer FAQ Page List</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-list-customer (staticContentTab)="triggerTab($event)"></app-list-customer>
                </ng-template>
            </ngb-tab>
        </ngb-tabset>
    </div>
</div>
