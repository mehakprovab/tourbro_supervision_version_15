<div class="sub-agent-container custom-table-layout card row" style="padding: 20px;">
    <div class="add-traveller">
        <div class="title">
            <h3>Faq Page Content</h3>
        </div>
        <div class="custom-inline-form">
            <form class="" [formGroup]="regConfig" autocomplete="off">
             
                <div class="form-group required row">
                    <label for="firstName" class="required" class="col-sm-2 col-form-label">Question</label>
                    <div class="col-sm-6">
                        <input type="text" class="form-control" id="firstName" 
                             formControlName="question">
                    </div>
                </div>
                <div class="form-group required row">
                    <label for="lastName" class="col-sm-2 col-form-label">Answer</label>
                    <div class="col-sm-6">
                        <input type="text" class="form-control" id="lastName" 
                             formControlName="answer">
                    </div>
                </div>
             
                   
                <div class="form-group row mb-n2">
                    <div class="col-sm-12 customCenter">
                        <button type="submit" class="btn btn-sm btn-primary mr-1" (click)="onSubmit()">Submit</button>
                        <button type="reset" class="btn btn-sm btn-primary" (click)="onReset()">Reset</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
