<div class="card-header text-uppercase bg-dark text-white">
  <h5 style="border-bottom:0">
    <i class="fa fa-edit"></i>&nbsp;Meditation Retreat
  </h5>
</div>

<div class="card">
  <form [formGroup]="regConfig" autocomplete="off">

    <div class="form-row">

      <!-- Retreat Name -->
      <div class="col-6 pr-0">
        <div class="form-group">
          <label>Retreat Name*</label>
          <input
            type="text"
            class="form-control form-control-sm"
            placeholder="Retreat Name"
            formControlName="retreat_name">
        </div>
      </div>

      <!-- Duration -->
      <div class="col-6 pr-0">
        <div class="form-group">
          <label>Duration*</label>
          <input
            type="text"
            class="form-control form-control-sm"
            placeholder="e.g. 7 Days"
            formControlName="duration">
        </div>
      </div>

      <!-- Description -->
      <div class="col-12 pr-0">
        <div class="form-group">
          <label>Description*</label>
          <textarea
            rows="2"
            class="form-control form-control-sm"
            placeholder="Description"
            formControlName="description">
          </textarea>
        </div>
      </div>

      <!-- Image -->
      <div class="col-6 pr-0">
        <div class="form-group">
          <label>Image*</label>
          <input
            type="file"
            class="form-control form-control-sm"
            accept=".png,.jpg,.jpeg"
            (change)="onFileChange($event.target.files)"
            #labelImport>

          <div *ngIf="imageSrc" class="mt-2">
            <img [src]="imageSrc" width="120" height="60" class="rounded">
          </div>

          <small class="text-danger">
            Max file size: 1 MB
          </small>
        </div>
      </div>

    </div>

    <!-- Buttons -->
    <div class="mt-3">
      <button type="button" class="btn btn-primary btn-sm" (click)="onSearchSubmit()">
        {{ btnName }}
      </button>
      &nbsp;
      <button type="button" class="btn btn-secondary btn-sm" (click)="onReset()">
        Reset
      </button>
    </div>

  </form>
</div>

<!-- LIST -->
<div class="card mt-4">
  <div class="card-body">

    <p>Total {{ respData?.length }} Retreats</p>

    <table class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>Retreat Name</th>
          <th>Duration</th>
          <th>Description</th>
          <th>Image</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngIf="!respData.length">
          <td colspan="6" class="text-center text-muted">No Data Found</td>
        </tr>

        <tr *ngFor="let item of respData; let i=index">
          <td>{{ i + 1 }}</td>
          <td>{{ item.retreat_name }}</td>
          <td>{{ item.duration }}</td>
          <td>{{ item.description }}</td>
          <td>
            <img *ngIf="item.image_url"
              [src]="getImage(item.image_url)"
              width="80"
              height="40">
          </td>
          <td>
            <a (click)="editList(item)" class="text-primary mr-2">
              <i class="fa fa-edit"></i>
            </a>
            <a (click)="deleteList(item.id)" class="text-danger">
              <i class="fa fa-trash"></i>
            </a>
          </td>
        </tr>
      </tbody>

    </table>

  </div>
</div>
