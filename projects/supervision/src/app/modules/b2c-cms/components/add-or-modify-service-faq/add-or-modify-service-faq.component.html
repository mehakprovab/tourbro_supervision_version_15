<div class="">
    <div class="">
        <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange(false)" #tabs
            [activeId]="activeIdString">
            <ngb-tab id="add_update_staticPage">
                <ng-template ngbTabTitle>
                    <span>Service FAQ Page Content</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-add-update-service-faq (staticContentTab)="triggerTab($event)"></app-add-update-service-faq>
                </ng-template>
            </ngb-tab>
            <ngb-tab id="staticpage_list">
                <ng-template ngbTabTitle>
                    <span> Service FAQ Page List</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-list-service (staticContentTab)="triggerTab($event)"></app-list-service>
                </ng-template>
            </ngb-tab>
        </ngb-tabset>
    </div>
</div>
