<ul
  ngbNav
  #tabs="ngbNav"
  class="tabs-animated custom_tab"
  [(activeId)]="activeIdString"
  (navChange)="beforeChange($event)">

  <li [ngbNavItem]="'add_update_staticPage'">

    <a ngbNavLink>
      Static Page Content
    </a>

    <ng-template ngbNavContent>
      <app-add-update-content
        (staticContentTab)="triggerTab($event)">
      </app-add-update-content>
    </ng-template>

  </li>

  <li [ngbNavItem]="'staticpage_list'">

    <a ngbNavLink>
      Page List
    </a>

    <ng-template ngbNavContent>
      <app-list-content
        (staticContentTab)="triggerTab($event)">
      </app-list-content>
    </ng-template>

  </li>

</ul>

<div [ngbNavOutlet]="tabs"></div>
