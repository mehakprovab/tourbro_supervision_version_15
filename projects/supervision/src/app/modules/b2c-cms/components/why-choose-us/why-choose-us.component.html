<div class="card adminInner">
  <div class="card-header mb-3">
    <h5 class="text-center">Why Choose Us</h5>
  </div>

  <form [formGroup]="regConfig" autocomplete="off">

    <!-- MAIN HEADING -->
    <div class="form-row">
      <div class="col-4">
        <label>Main Heading *</label>
        <input formControlName="main_heading" class="form-control" />
        <small class="text-danger" *ngIf="regConfig.get('main_heading').touched && regConfig.get('main_heading').invalid">
          Required
        </small>
      </div>

      <div class="col-8">
        <label>Sub Heading *</label>
        <input formControlName="sub_heading" class="form-control" />
        <small class="text-danger" *ngIf="regConfig.get('sub_heading').touched && regConfig.get('sub_heading').invalid">
          Required
        </small>
      </div>
    </div>

    <!-- STATS -->
    <div class="form-row mt-2">
      <div class="col-2">
        <input formControlName="stat1_value" class="form-control" placeholder="Value 1">
      </div>
      <div class="col-2">
        <input formControlName="stat1_label" class="form-control" placeholder="Label 1">
      </div>

      <div class="col-2">
        <input formControlName="stat2_value" class="form-control" placeholder="Value 2">
      </div>
      <div class="col-2">
        <input formControlName="stat2_label" class="form-control" placeholder="Label 2">
      </div>

      <div class="col-2">
        <input formControlName="stat3_value" class="form-control" placeholder="Value 3">
      </div>
      <div class="col-2">
        <input formControlName="stat3_label" class="form-control" placeholder="Label 3">
      </div>
    </div>

    <!-- HEADER 1 -->
    <div class="form-row mt-3">
      <div class="col-4">
        <input formControlName="header1" class="form-control" placeholder="Title 1">
      </div>
      <div class="col-8">
        <input formControlName="description1" class="form-control" placeholder="Description 1">
      </div>
    </div>

    <!-- HEADER 2 -->
    <div class="form-row mt-2">
      <div class="col-4">
        <input formControlName="header2" class="form-control" placeholder="Title 2">
      </div>
      <div class="col-8">
        <input formControlName="description2" class="form-control" placeholder="Description 2">
      </div>
    </div>

    <!-- HEADER 3 -->
    <div class="form-row mt-2">
      <div class="col-4">
        <input formControlName="header3" class="form-control" placeholder="Title 3">
      </div>
      <div class="col-8">
        <input formControlName="description3" class="form-control" placeholder="Description 3">
      </div>
    </div>

    <!-- IMAGE -->
    <div class="form-group mt-3">
      <label>Upload Images (Max 2, JPG/PNG, 1MB)</label>
      <input type="file" (change)="onFileSelected($event)" multiple />
    </div>
<!-- IMAGE PREVIEW -->
<div class="mt-3 d-flex">

  <!-- ✅ Existing Images -->
  <div *ngFor="let img of existingImages" class="mr-2 text-center">
    <p class="mb-1">Existing</p>
    <img 
      [src]="img" 
      width="120" 
      height="80" 
      style="object-fit: cover; border: 1px solid #ccc;"
    />
  </div>

  <!-- ✅ New Selected Images -->
  <div *ngFor="let img of imagePreviews" class="mr-2 text-center">
    <p class="mb-1">New</p>
    <img 
      [src]="img" 
      width="120" 
      height="80" 
      style="object-fit: cover; border: 1px solid #28a745;"
    />
  </div>

</div>
    <!-- BUTTONS -->
    <div class="text-center mt-3">
      <button type="button" class="btn btn-primary" (click)="onSubmit()">Submit</button>
      <button type="button" class="btn btn-secondary ml-2" (click)="onReset()">Reset</button>
    </div>

  </form>
</div>
