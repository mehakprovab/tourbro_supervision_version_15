<div class="card-header text-uppercase bg-dark text-white"><h5 style="border-bottom: 0;"><i class="fa fa-tag fa-lg"></i>&nbsp; B2C Helpdesk Inquiry</h5></div>
<div class="card">
    <form [formGroup]="regConfig">
       <div class="form-row">
          <div class="col-4 pr-0">
             <div class="form-group">
                <label for="phone">Phone</label>
                <input formControlName="contact_info" type="text" class="form-control form-control-sm nrm_input"
                   placeholder="Phone" id="phone" onkeypress='return event.charCode >= 48 && event.charCode <= 57'>
             </div>
          </div>
          <div class="col-4 pr-0">
             <div class="form-group">
                <label for="email">Email</label>
                <input formControlName="email_id" type="email" class="form-control form-control-sm nrm_input"
                   placeholder="Email" id="email">
             </div>
          </div>
          <div class="col-4 pr-0">
            <div class="form-group">
                <label>Ticket Number</label>
                <input type="text" formControlName="ticket_number" class="form-control text-capitalize form-control-sm nrm_input"
                    placeholder="Ticket Number">
                <div>
                </div>
            </div>
        </div>
          <div class="col-4 pr-0">
             <div class="form-group">
                <span class="icon depart_date" (click)="isOpen= !isOpen"></span>
                <label for="fromDate">Requested From Date</label>
                <input formControlName="requested_date_from" type="text" id="fromDate" autocomplete="off" 
                class="form-control form-control-sm nrm_input" placement="bottom left" placeholder="dd/mm/yyyy"
                bsDatepicker [bsConfig]="bsDateConf" [isOpen]="isOpen" onkeydown="return false" [maxDate]="maxDate">
             </div>
          </div>
          <div class="col-4 pr-0">
             <div class="form-group">
                <span class="icon depart_date" (click)="isOpen= !isOpen"></span>
                <label for="toDate">Requested To Date</label>
                <input formControlName="requested_date_to" type="text" id="toDate" autocomplete="off"
                class="form-control form-control-sm nrm_input" placement="bottom left" placeholder="dd/mm/yyyy"
                bsDatepicker [bsConfig]="bsDateConf" [isOpen]="isOpen" onkeydown="return false" [maxDate]="maxDate">
             </div>
          </div>
       </div>
       <div class="btncontainer">
          <button type="submit" class="btnStyle" (click)="onSearchSubmit()">Search</button> &nbsp;
          <button type="button" class="btnStyle" (click)="onReset()">Reset</button>
       </div>
    </form>
 </div>
 <div class="card" style="margin-top: 30px;">
    <div class="card-body">
    	<p>Total {{respData?.length}} Records</p>
       <div class="mb-3">
          <form>
             <div class="table-responsive">
                <table class="table table-borderless table-striped table-hover" matSort
                   (matSortChange)="sortData($event)" id="b2c-car-report">
                   <thead>
                      <tr>
                         <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn;"
                            >
                            {{header.value }} 
                         </th>
                      </tr>
                   </thead>
                   <tbody>
                    <tr *ngIf="!noData && !respData.length">
                        <td colspan="11">
                            <h4 class="text-muted text-center">
                                No Data Found!
                            </h4>
                        </td>
                    </tr>
                    <tr *ngIf="noData">
                        <td colspan="11">
                            <mat-spinner [diameter]="30" style="margin:0 auto;" mode="indeterminate"></mat-spinner>
                        </td>
                    </tr>
                      <tr
                         *ngFor="let data of respData | slice: (page - 1) * pageSize : (page - 1) * pageSize + pageSize; let i=index;">
                         <td class="text-left text-muted">{{i+1}}.</td>
                         <td class="text-left"> {{data['agency_name']}} </td>
                         <td class="text-left"> {{data['email_id']}} </td>
                         <td class="text-left"> {{data['phone_number']}} </td>
                         <td class="text-left text-uppercase"> {{data['reference_id']}} </td>
                         <td class="text-left"> {{data['ticket_number']}} </td>
                         <td class="text-left text-capitalize"> {{data['remarks']}} </td>
                         <td class="text-left"> {{data['requested_date'] | date: 'dd/MM/yyyy'}} </td>
                      </tr>
                   </tbody>
                </table>
             </div>
             <div class="card-footer pb-0">
                <div class="d-flex w-100 justify-content-between">
                   <ngb-pagination [collectionSize]="collectionSize" [(page)]="page" [pageSize]="pageSize">
                   </ngb-pagination>
                   <select class="custom-select" style="width: auto" name="pageSize" [(ngModel)]="pageSize">
                   <option [ngValue]="50">50 items per page</option>
                   <option [ngValue]="100">100 items per page</option>
                   <option [ngValue]="150">150 items per page</option>
                   <option [ngValue]="200">200 items per page</option>
                   <option [ngValue]="500">500 items per page</option>
                   <option [ngValue]="700">700 items per page</option>
                   <option [ngValue]="1000">1000 items per page</option>
                   </select>
                </div>
             </div>
          </form>
       </div>
    </div>
 </div>
