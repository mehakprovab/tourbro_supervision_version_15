<div class="card adminInner">

    <div class="card-header mb-3">
        <h5>Pricing Rules List</h5>
    </div>

    <!-- ================= FILTER ================= -->
    <div class="Queues mt-2 mb-2">

        <div class="row">

            <div class="col-6 pr-0">
                <label>Operator Name</label>
                <input type="text" class="form-control form-control-sm" [(ngModel)]="searchData.operator_name">
            </div>

            <div class="col-6">
                <label>Route Id</label>
                <input type="text" class="form-control form-control-sm" [(ngModel)]="searchData.route_id">
            </div>

        </div>

        <div class="btncontainer mt-2">

            <button class="btn btn-primary" (click)="search()">
                Search
            </button>

            &nbsp;

            <button class="btn btn-secondary" (click)="reset()">
                Reset
            </button>

        </div>

    </div>

</div>

<!-- ================= TABLE ================= -->
<div class="card adminInner mt-3">

    <div class="d-flex justify-content-between pb-3">

        <div>
            <button class="btn btn-primary" (click)="exportExcel()">Export</button>
            &nbsp;
            <button class="btn btn-secondary">Filter</button>
        </div>

        <div class="form-group col-sm-3 p-0">
            <input type="text" class="form-control" placeholder="Search..." [(ngModel)]="searchTerm"
                (input)="filterList()">
        </div>

    </div>

    <div class="table-respons">

        <table class="table table-striped table-hover">

            <thead>

                <tr>
                    <th>Sl No</th>
                    <th>Status</th>
                    <th>Operator</th>
                    <th>Route Id</th>
                    <th>Base Fare</th>
                    <th>Taxes</th>
                    <th>Effective From</th>
                    <th>Effective To</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let item of filteredPricingList; let i = index">

                    <td>{{ i + 1 }}</td>

                    <td>
                        <label class="switch">
                            <input type="checkbox" [(ngModel)]="item.status" (change)="updateStatus(item)">
                            <span class="slider round"></span>
                        </label>
                    </td>

                    <td>{{ item.operator_name }}</td>
                    <td>{{ item.route_id }}</td>
                    <td>{{ item.base_fare }}</td>
                    <td>{{ item.taxes }}</td>
                    <td>{{ item.effective_from }}</td>
                    <td>{{ item.effective_to }}</td>

                    <td>
                        <button class="btn btn-sm btn-primary mr-2" (click)="edit(item)">
                            Edit
                        </button>

                        <button class="btn btn-sm btn-secondary" (click)="delete(item)">
                            Delete
                        </button>
                    </td>

                </tr>

                <tr *ngIf="filteredPricingList.length === 0">
                    <td colspan="9" class="text-center">
                        No Records Found
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>
