<div class="row mx-0 pt-2">

  <div class="col-md-12">

    <h5>
      <b>Hotel Name:</b> {{ hotelOne.hotel_name }}
    </h5>

    <div class="card main-card mb-6">
      <div class="card-body">

        <ul
          ngbNav
          #tabs="ngbNav"
          class="tabs-animated custom_tab"
          [(activeId)]="activeIdString"
          (navChange)="beforeChange($event)">

          <li [ngbNavItem]="'list_hotel_types'">

            <a ngbNavLink>
              {{ 'List Children policy' }}
            </a>

            <ng-template ngbNavContent>
              <app-children-pollicy-list
                (toUpdate)="triggerTab($event)"
                [hotelOneData]="hotelOne">
              </app-children-pollicy-list>
            </ng-template>

          </li>

          <li [ngbNavItem]="'add_hotel_type'">

            <a ngbNavLink>
              {{ 'Add/Edit Children Policy' }}
            </a>

            <ng-template ngbNavContent>
              <app-add-update-children-pollicy
                (someEvent)="triggerTab($event)"
                [hotelOneData]="hotelOne"
                [hotelTypeOne]="hotelTypeData">
              </app-add-update-children-pollicy>
            </ng-template>

          </li>

        </ul>

        <div [ngbNavOutlet]="tabs"></div>

        <button
          type="button"
          class="btn btn-sm btn-primary btnStyle"
          (click)="goToHotelList()">

          Hotel List
        </button>

      </div>
    </div>

  </div>
</div>
