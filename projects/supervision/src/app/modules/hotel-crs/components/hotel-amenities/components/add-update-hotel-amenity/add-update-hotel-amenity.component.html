<div class="card adminInner">
    <div class="card-header mb-3">
       <h5>Hotel Amenity</h5>
    </div>
    <form [formGroup]="hotelAmenityForm" (ngSubmit)="handleValidSubmit()" class="needs-validation btop pt-4" novalidate>
            <div class="card-body p-0 mt-3">
                <fieldset form="user">
                    <div class="row">
                        <div class="col-3 pr-0">
                             <div class="form-group">
                                <label class="p-0 control-label" for="hotel_amenity_name">
                                    Hotel Amenity Name
                                    <span class="text-danger">*</span>
                                </label>
                                <div class="p-0">
                                    <input value="" formControlName="hotel_amenity_name" type="text" placeholder="Hotel Amenity Name"
                                        class="form-control" [ngClass]="{ 'is-invalid': submitted && f.hotel_amenity_name.errors }"
                                        required />
                                </div>
                                <div *ngIf="submitted && f.hotel_amenity_name.errors" class="invalid-feedback">
                                    <div *ngIf="f.hotel_amenity_name.errors.required">Hotel Amenity Name is required</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-3">
                             <div class="form-group">
                                <label class="p-0 control-label" for="status">
                                    Status
                                    <span class="text-danger">*</span>
                                </label>
                                <span title="Slide for Active/Deactive">
                                    <mat-slide-toggle class="example-margin" formControlName="status" 
                                        [color]="'green'">
                                    </mat-slide-toggle>
                                </span>
                            </div>
                        </div>
                        <div class="col-3 pl-0">
                            <div class="form-group">
                                <div class="btncontainer">
                                    <button type="submit" id="user_submit" class=" btn btn-primary">Save</button> &nbsp; &nbsp;
                                    <button type="reset" id="user_reset" class=" btn btn-secondary"
                                        (click)="resetFrom()">Reset</button>
                                </div>
                            </div>

                        </div>

                    </div>
                   
                   
                </fieldset>
                
            </div>
    </form>
</div>
