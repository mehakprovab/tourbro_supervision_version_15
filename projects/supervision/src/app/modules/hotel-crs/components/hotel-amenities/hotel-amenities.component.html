<ul
  ngbNav
  #tabs="ngbNav"
  class="tabs-animated custom_tab crs-tab-ui"
  [(activeId)]="activeIdString"
  (navChange)="beforeChange($event)">

  <li [ngbNavItem]="'list_hotel_amenity'">

    <a ngbNavLink>
      {{ 'List Hotel Amenity' }}
    </a>

    <ng-template ngbNavContent>
      <app-hotel-amenity-list
        (toUpdate)="triggerTab($event)">
      </app-hotel-amenity-list>
    </ng-template>

  </li>

  <li [ngbNavItem]="'add_hotel_amenity'">

    <a ngbNavLink>
      {{ 'Add/Edit Hotel Amenity' }}
    </a>

    <ng-template ngbNavContent>
      <app-add-update-hotel-amenity
        (someEvent)="triggerTab($event)"
        [hotelAmenityOne]="hotelAmenityData">
      </app-add-update-hotel-amenity>
    </ng-template>

  </li>

</ul>

<div [ngbNavOutlet]="tabs"></div>
