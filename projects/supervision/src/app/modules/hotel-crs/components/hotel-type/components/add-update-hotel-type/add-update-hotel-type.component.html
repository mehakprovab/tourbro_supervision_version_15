<div class="card adminInner">
    <div class="card-header">
        <h5>{{'Stay Type'}}</h5>
    </div>
    <form [formGroup]="hotelTypeForm" (ngSubmit)="handleValidSubmit()" class="needs-validation pt-3" novalidate>
        <div class="card-body p-0">
            <fieldset form="user">
                <div class="form-row">
                    <div class="col-md-4">
                        <label class=" control-label" for="hotel_type_name">
                            Stay Type Name
                            <span class="text-danger">*</span>
                        </label>

                        <input value="" formControlName="hotel_type_name" type="text" placeholder="Hotel Type Name"
                            class="form-control" [ngClass]="{ 'is-invalid': submitted && f.hotel_type_name.errors }"
                            required />

                        <div *ngIf="submitted && f.hotel_type_name.errors" class="invalid-feedback">
                            <div *ngIf="f.hotel_type_name.errors.required">Hotel Type Name is required</div>
                        </div>

                    </div>
                    <div class="col-md-4">
                        <label class="control-label" for="hotel_type_name">
                            Status
                            <span class="text-danger">*</span>
                        </label>
                        <span title="Slide for Active/Deactive">
                            <mat-slide-toggle class="example-margin" formControlName="status" [color]="''">
                            </mat-slide-toggle>
                        </span>

                    </div>
                    <div class="col-md-4">
                        <button type="submit" id="user_submit" class=" btn btn-primary">Save</button> &nbsp; &nbsp;
                        <button type="reset" id="user_reset" class=" btn btn-secondary"
                            (click)="resetFrom()">Reset</button>

                    </div>

                </div>

            </fieldset>

        </div>
    </form>
</div>
