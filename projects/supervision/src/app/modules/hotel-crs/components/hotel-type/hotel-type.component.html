<ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange($event)" #tabs>
    <ngb-tab id="list_hotel_types">
        <ng-template ngbTabTitle>
            <span class="">{{'List Stay Types'}}</span>
        </ng-template>
        <ng-template ngbTabContent>
            <app-hotel-type-list (toUpdate)="triggerTab($event)"></app-hotel-type-list>
        </ng-template>
    </ngb-tab>
    <ngb-tab id="add_hotel_type">
        <ng-template ngbTabTitle>
            <span class="">{{'Add/Edit Stay Type'}}</span>
        </ng-template>
        <ng-template ngbTabContent>
            <app-add-update-hotel-type (someEvent)="triggerTab($event)" [hotelTypeOne]="hotelTypeData"></app-add-update-hotel-type>
        </ng-template>
    </ngb-tab>
</ngb-tabset>
