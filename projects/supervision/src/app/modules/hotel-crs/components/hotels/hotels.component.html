<ul
  ngbNav
  #tabs="ngbNav"
  class="tabs-animated custom_tab"
  [(activeId)]="activeIdString"
  (navChange)="onTabSelected($event)">

  <li [ngbNavItem]="'list_hotels'">

    <a ngbNavLink>
      {{ 'List Stay' }}
    </a>

    <ng-template ngbNavContent>
      <app-hotel-list
        (toUpdate)="triggerTab($event)">
      </app-hotel-list>
    </ng-template>

  </li>

  <li [ngbNavItem]="'add_hotel'">

    <a ngbNavLink>

      <span *ngIf="activeIdString && !selected && !eventData && !priceEvent && !priceManagementEvent">
        {{ 'Add/Edit Stay' }}
      </span>

      <span *ngIf="selected == 'isHotelData'">
        {{ 'Add/Edit Stay' }}
      </span>

      <span *ngIf="selected == 'isHotelImage'">
        {{ 'Add/Edit Stay Image' }}
      </span>

      <span *ngIf="selected == 'isRoomDetail'">
        {{ 'Add/Edit Room Detail' }}
      </span>

      <span *ngIf="eventData == true">
        {{ 'Add/Edit Room Image' }}
      </span>

      <span *ngIf="priceEvent == true">
        {{ 'Add/Edit Price Detail' }}
      </span>

      <span *ngIf="priceManagementEvent == true">
        {{ 'Update Price Management Detail' }}
      </span>

      <span *ngIf="selected == 'istax'">
        {{ 'Update Stay Tax' }}
      </span>

      <span *ngIf="selected == 'isChildren'">
        {{ 'Update Children Policy' }}
      </span>

    </a>

    <ng-template ngbNavContent>

      <app-add-update-hotel
        (someEvent)="triggerTab($event)"
        [selected]="selected"
        [hotelOne]="hotelData"
        [isPricedetail]="priceDirectData">
      </app-add-update-hotel>

    </ng-template>

  </li>

</ul>

<div [ngbNavOutlet]="tabs"></div>
