<ul
  ngbNav
  #tabs="ngbNav"
   [(activeId)]="activeId"
  class="tabs-animated custom_tab crs-tab-ui"
  (navChange)="beforeChange($event)">

  <li [ngbNavItem]="'list_hotel_types'">

    <a ngbNavLink>
      {{ 'List View' }}
    </a>

    <ng-template ngbNavContent>
      <app-list-room-view
        (toUpdate)="triggerTab($event)">
      </app-list-room-view>
    </ng-template>

  </li>

  <li [ngbNavItem]="'add_hotel_type'">

    <a ngbNavLink>
      {{ 'Add/Edit View Type' }}
    </a>

    <ng-template ngbNavContent>
      <app-add-update-room-view
        (someEvent)="triggerTab($event)"
        [hotelTypeOne]="hotelTypeData">
      </app-add-update-room-view>
    </ng-template>

  </li>

</ul>

<div [ngbNavOutlet]="tabs"></div>
