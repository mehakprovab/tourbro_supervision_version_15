<hr>

<div class="">

  <div class="">

    <ul
      ngbNav
      #tabs="ngbNav"
      class="tabs-animated custom_tab">

      <li [ngbNavItem]="'markup_list'">

        <a ngbNavLink>
          AGENT MARKUP LIST
        </a>

        <ng-template ngbNavContent>
          <app-agent-mark-up-list
            (toUpdate)="triggerTab($event)">
          </app-agent-mark-up-list>
        </ng-template>

      </li>

      <!--
      <li [ngbNavItem]="'markup_detail'">
        <a ngbNavLink>
          <i class="fa fa-bank"></i>&nbsp; MARKUP DETAILS
        </a>

        <ng-template ngbNavContent>
          <app-agent-markup-detail
            (toUpdate)="triggerTab($event)">
          </app-agent-markup-detail>
        </ng-template>
      </li>
      -->

      <li [ngbNavItem]="'default_markup'">

        <a ngbNavLink>
          ADD/UPDATE MARKUP
        </a>

        <ng-template ngbNavContent>
          <app-agent-markup-add-update
            [getDataToUpdate]="userData"
            (toList)="triggerTab($event)">
          </app-agent-markup-add-update>
        </ng-template>

      </li>

    </ul>

    <div [ngbNavOutlet]="tabs"></div>

  </div>
</div>
