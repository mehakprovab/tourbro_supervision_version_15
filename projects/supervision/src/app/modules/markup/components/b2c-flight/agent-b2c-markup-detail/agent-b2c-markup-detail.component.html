<div class="card mt-3" *ngIf="!noData">
    <div class="card-header">
        <h5 class="card-title" *ngIf="agencyDetails">
            {{'Agency Name: '+ agencyDetails?.business_name}}
        </h5>
    </div>
    <table class="card-table table" matSort>
        <thead>
            <tr>
                <th scope="col" class="text-center" *ngFor="let header of displayColumn;">
                    {{header.value }}
                </th>
            </tr>
        </thead>
        <tbody>
            <tr *ngIf="noData">
                <td colspan="11">
                    <mat-spinner [diameter]="30" style="margin:0 auto;" mode="indeterminate"></mat-spinner>
                </td>
            </tr>
            <tr *ngIf="!noData && !markupList.length">
                <td colspan="11">
                    <h4 class="text-muted text-center">
                        No Data Found!
                    </h4>
                </td>
            </tr>
            <tr *ngFor="let data of markupList; let i = index">
                <td class="align-middle text-center">{{i+1}}.</td>
                <td class="align-middle text-center">
                <!-- <img *ngIf="data?.flightAirline?.code !== 'ALL'" [src]="airlineLogoUrl + data?.flightAirline?.code + '.gif'"><br> -->
                    {{data?.flightAirline?.name}} ({{data?.flightAirline?.code}})
                </td>
                <!-- <td class="align-middle text-center text-capitalize">
                    {{data?.value_type}}
                </td> -->
                <td class="align-middle text-center">
                    {{data?.value}}
                </td>
                <td class="align-middle text-center">
                    <ng-container
                        *ngFor="let item of data?.segment_list | map: getFormattedSegment | keyvalue;let last=last">
                        <!-- {{item}} -->
                        {{item.key}} {{ data?.segment_list === '{}' || data?.segment_list === '' ? '' : getSegmentList(item.value)}} <span *ngIf="!last">|</span>
                    </ng-container>
                </td>
                <td class="align-middle text-center">
                    <button class="btn btn-sm btn-primary" (click)="updateMarkup(data)">
                        <i class="fa fa-edit text-nowrap">
                            {{'Update'}}
                        </i>
                    </button>&nbsp;
                    <button class="btn btn-sm btn-primary" (click)="deleteMarkup(data)">
                        <i class="fa fa-edit text-nowrap">
                            {{'Delete'}}
                        </i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
