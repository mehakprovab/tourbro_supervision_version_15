<div class="row col-lg-12 col-md-12 pt-3 m-0 card">

  <ul
    ngbNav
    #tabs="ngbNav"
    class="nav-tabs tabs-animated custom_tab">

    <li
      *ngFor="let link of navLinks; let i = index"
      [ngbNavItem]="i">

      <a ngbNavLink (click)="onSelect(link.component)">
        <i [class]="link.icon"></i>&nbsp; {{ link.label }}
      </a>

      <ng-template ngbNavContent>

        <div class="row" [ngSwitch]="link.component">

          <div *ngSwitchCase="'Percantage_Commission'" class="col-md-12 col-lg-12">

            <!-- Optional header commented out -->
            <!--
            <div class="mb-3">
              <div class="card-header-tab card-header">
                <div class="card-header-title font-size-lg text-capitalize font-weight-normal">
                  <i class="header-icon lnr-laptop-phone mr-3 text-muted opacity-6"></i>
                  Update Balance / Deposit Request / Due Payment
                </div>
              </div>
            </div>
            -->

            <app-percentage-commission></app-percentage-commission>

          </div>

          <div *ngSwitchCase="'History_Deposit_Request'" class="col-md-12 col-lg-12">
            <!-- <app-history-deposit-request></app-history-deposit-request> -->
          </div>

          <div *ngSwitchCase="'bus'" class="col-md-12 col-lg-12">
            <!-- <app-bus></app-bus> -->
          </div>

          <div *ngSwitchCase="'transfers'" class="col-md-12 col-lg-12">
            <!-- <app-transfers></app-transfers> -->
          </div>

          <div *ngSwitchCase="'activities'" class="col-md-12 col-lg-12">
            <!-- <app-activities></app-activities> -->
          </div>

        </div>

      </ng-template>

    </li>

  </ul>

  <div [ngbNavOutlet]="tabs"></div>

</div>
