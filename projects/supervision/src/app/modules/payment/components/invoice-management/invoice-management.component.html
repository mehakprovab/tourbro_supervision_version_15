<!-- <p>invoice-management works!</p> -->
<div class="topSectionContainer">
    <button class="btnStyle">INVOICE MANAGEMENT</button>
    <div class="dropdownStyle">
        <label for="module" style="color: #082B3A;">MODULE TYPE</label>
        <select name="module" id="module">
            <option value="volvo">Flight</option>
            <option value="saab">Hotel</option>
            <option value="opel">Insurance</option>
        </select>
    </div>

</div>
