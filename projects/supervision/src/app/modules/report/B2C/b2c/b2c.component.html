<button routerLink="/report/b2c-flight" class="css">Flight</button>
<button routerLink="/report/b2c-hotel" class="css ml-3">Hotel</button>
<button routerLink="/report/b2c-wellness" class="css ml-3">Wellness</button>
<button routerLink="/report/b2c-heli" class="css ml-3">Heli</button>
<button routerLink="/report/b2c-car" class="css ml-3">Car</button>

<div class="">
  <div class="">

    <ul
      ngbNav
      #tabs="ngbNav"
      class="nav-tabs tabs-animated custom_tab">

      <li [ngbNavItem]="1">
        <a ngbNavLink>
          <span>Flight Bookings</span>
        </a>

        <ng-template ngbNavContent>
          <app-b2c-flight></app-b2c-flight>
        </ng-template>
      </li>

      <li [ngbNavItem]="2">
        <a ngbNavLink>
          <span>Hotel Bookings</span>
        </a>

        <ng-template ngbNavContent>
          <app-b2c-hotel></app-b2c-hotel>
        </ng-template>
      </li>

      <li [ngbNavItem]="3">
        <a ngbNavLink>
          <span>Wellness Bookings</span>
        </a>

        <ng-template ngbNavContent>
          <app-b2c-wellness-report></app-b2c-wellness-report>
        </ng-template>
      </li>

      <li [ngbNavItem]="4">
        <a ngbNavLink>
          <span>Heli Bookings</span>
        </a>

        <ng-template ngbNavContent>
          <app-b2c-heli-report></app-b2c-heli-report>
        </ng-template>
      </li>

      <li [ngbNavItem]="5">
        <a ngbNavLink>
          <span>Car Bookings</span>
        </a>

        <ng-template ngbNavContent>
          <app-b2c-car></app-b2c-car>
        </ng-template>
      </li>

    </ul>

    <div [ngbNavOutlet]="tabs" class="mt-3"></div>

  </div>
</div>
