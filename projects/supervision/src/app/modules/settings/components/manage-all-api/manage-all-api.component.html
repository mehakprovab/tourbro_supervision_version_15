<div class="row mx-0 pt-2">
  <div class="col-md-12">
    <div class="card main-card mb-6">
      <div class="card-body">

        <ul
          ngbNav
          #tabs="ngbNav"
          [(activeId)]="activeIdString"
          (navChange)="beforeChange($event)"
          class="nav-tabs tabs-animated custom_tab">

          <li [ngbNavItem]="'flight_api_list'">
            <a ngbNavLink>
              <i class="vsm-icon pe-7s-user" style="font-weight: 600;"></i>
              &nbsp;B2C
            </a>
            <ng-template ngbNavContent>
              <app-manage-api
                (toUpdate)="triggerTab($event)">
              </app-manage-api>
            </ng-template>
          </li>

          <li [ngbNavItem]="'hotel_api_list'">
            <a ngbNavLink>
              <i class="vsm-icon pe-7s-users" style="font-weight: 600;"></i>
              &nbsp;B2B
            </a>
            <ng-template ngbNavContent>
              <app-manage-b2b-api
                (someEvent)="triggerTab($event)">
              </app-manage-b2b-api>
            </ng-template>
          </li>

        </ul>

        <div [ngbNavOutlet]="tabs" class="mt-3"></div>

      </div>
    </div>
  </div>
</div>
