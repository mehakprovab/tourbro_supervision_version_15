<div class="row mx-0 pt-2">
    <div class="col-md-12">
        <div class="card main-card mb-6">
            <div class="card-body">
                <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange($event)" #tabs>
                    <ngb-tab id="flight_api_list">
                        <ng-template ngbTabTitle>
                            <span class="">
                                <i class="vsm-icon pe-7s-user" aria-hidden="true" style="font-weight: 600;"></i>
                                &nbsp;{{'B2C'}}
                            </span>
                        </ng-template>
                        <ng-template ngbTabContent>
                            <app-manage-api (toUpdate)="triggerTab($event)"></app-manage-api>
                        </ng-template>
                    </ngb-tab>
                    <ngb-tab id="hotel_api_list">
                        <ng-template ngbTabTitle>
                            <span class="">
                                <i class="vsm-icon pe-7s-users" aria-hidden="true" style="font-weight: 600;"></i>
                                &nbsp;{{'B2B'}}
                            </span>
                        </ng-template>
                        <ng-template ngbTabContent>
                            <app-manage-b2b-api (someEvent)="triggerTab($event)"></app-manage-b2b-api>
                        </ng-template>
                    </ngb-tab>

                        </ng-template>
                    </ngb-tab>

                            <app-car-api (someEvent)="triggerTab($event)"></app-car-api>

            </div>
        </div>
    </div>
