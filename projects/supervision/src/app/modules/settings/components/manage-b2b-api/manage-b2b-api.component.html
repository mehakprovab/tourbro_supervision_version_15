<div class="row mx-0 pt-2">
  <div class="col-md-12">
    <div class="card main-card mb-6">
      <div class="card-body">

        <ul
          ngbNav
          #tabs="ngbNav"
          [(activeId)]="activeId"
          (navChange)="beforeChange($event)"
          class="nav-tabs tabs-animated custom_tab">

          <li [ngbNavItem]="'flight_api_list'">
            <a ngbNavLink>
              <i class="fa fa-plane"></i>&nbsp;Flight
            </a>
            <ng-template ngbNavContent>
              <app-b2b-flight-api
                (toUpdate)="triggerTab($event)">
              </app-b2b-flight-api>
            </ng-template>
          </li>

          <li [ngbNavItem]="'hotel_api_list'">
            <a ngbNavLink>
              <i class="fa fa-bed"></i>&nbsp;Hotel
            </a>
            <ng-template ngbNavContent>
              <app-b2b-hotel-api
                (someEvent)="triggerTab($event)">
              </app-b2b-hotel-api>
            </ng-template>
          </li>

          <li [ngbNavItem]="'activity_api_list'">
            <a ngbNavLink>
              <i class="fa fa-binoculars"></i>&nbsp;Activity
            </a>
            <ng-template ngbNavContent>
              <app-b2b-activity-api
                (someEvent)="triggerTab($event)">
              </app-b2b-activity-api>
            </ng-template>
          </li>

          <li [ngbNavItem]="'transfer_api_list'">
            <a ngbNavLink>
              <i class="fa fa-taxi"></i>&nbsp;Transfer
            </a>
            <ng-template ngbNavContent>
              <app-b2b-transfer-api
                (someEvent)="triggerTab($event)">
              </app-b2b-transfer-api>
            </ng-template>
          </li>

          <li [ngbNavItem]="'tour_api_list'">
            <a ngbNavLink>
              <i class="fa fa-tree"></i>&nbsp;Tour
            </a>
            <ng-template ngbNavContent>
              <app-b2b-tour-api
                (someEvent)="triggerTab($event)">
              </app-b2b-tour-api>
            </ng-template>
          </li>

          <!--
          <li [ngbNavItem]="'car_api_list'">
            <a ngbNavLink>
              <i class="fa fa-car"></i>&nbsp;Car
            </a>
            <ng-template ngbNavContent>
              <app-car-api
                (someEvent)="triggerTab($event)">
              </app-car-api>
            </ng-template>
          </li>
          -->

        </ul>

        <div [ngbNavOutlet]="tabs" class="mt-3"></div>

      </div>
    </div>
  </div>
</div>
