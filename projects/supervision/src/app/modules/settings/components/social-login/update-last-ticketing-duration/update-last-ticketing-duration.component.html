<div class="row mx-0 pt-2">
  <div class="col-md-12">
    <div class="card main-card mb-6">
      <div class="card-body">

        <ul
          ngbNav
          #tabs="ngbNav"
          [(activeId)]="activeId"
          class="nav-tabs tabs-animated custom_tab">

          <li [ngbNavItem]="'update'">
            <a ngbNavLink>
              <i class="fa fa-save" aria-hidden="true"></i>
              &nbsp;Update Ticketing Duration
            </a>
            <ng-template ngbNavContent>
              <app-update-ticketing-duration
                (toUpdate)="triggerTab($event)">
              </app-update-ticketing-duration>
            </ng-template>
          </li>

          <li [ngbNavItem]="'ticketing_list'">
            <a ngbNavLink>
              <i class="fa fa-list" aria-hidden="true"></i>
              &nbsp;Airline List
            </a>
            <ng-template ngbNavContent>
              <app-updated-listing
                (someEvent)="triggerTab($event)">
              </app-updated-listing>
            </ng-template>
          </li>

        </ul>

        <div [ngbNavOutlet]="tabs" class="mt-3"></div>

      </div>
    </div>
  </div>
</div>
