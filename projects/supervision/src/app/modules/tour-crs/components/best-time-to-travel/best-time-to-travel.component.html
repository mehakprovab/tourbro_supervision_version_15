<div class="">
    <div class="">
        <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange(false)" #tabs
            [activeId]="activeIdString">
            <ngb-tab id="add_update_staticPage">
                <ng-template ngbTabTitle>
                    <span> Best Time To Travel</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-add-best-time-to-travel (staticContentTab)="triggerTab($event)"></app-add-best-time-to-travel>
                </ng-template>
            </ngb-tab>
            <ngb-tab id="staticpage_list">
                <ng-template ngbTabTitle>
                    <span> Best Time To Travel List</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-update-best-time-to-travel (staticContentTab)="triggerTab($event)"></app-update-best-time-to-travel>
                </ng-template>
            </ngb-tab>
        </ngb-tabset>
    </div>
</div>
