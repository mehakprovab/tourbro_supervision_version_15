<div class="">
    <div class="">
        <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange(false)" #tabs
            [activeId]="activeIdString">
            <ngb-tab id="add_update_staticPage">
                <ng-template ngbTabTitle>
                    <span>City Package Master </span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-add-update-city-package-master (staticContentTab)="triggerTab($event)"></app-add-update-city-package-master>
                </ng-template>
            </ngb-tab>
            <ngb-tab id="staticpage_list">
                <ng-template ngbTabTitle>
                    <span> City Package Master List</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-city-package-master-list (staticContentTab)="triggerTab($event)"></app-city-package-master-list>
                </ng-template>
            </ngb-tab>
        </ngb-tabset>
    </div>
</div>
