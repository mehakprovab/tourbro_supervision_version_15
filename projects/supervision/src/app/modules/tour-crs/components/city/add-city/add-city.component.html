<div class="col-12">
  <form [formGroup]="cityForm" (ngSubmit)="onCitySave()">
<div class="form-row">
    <!-- Country / State -->
    <div class="col-md-4">
      <label class="">Choose State</label>
      <select formControlName="stateId">
        <option value="" disabled selected>Choose State</option>
        <option *ngFor="let option of stateDataList" [value]="option.id">
          {{ option.name }}
        </option>
      </select>
       <div *ngIf="cityForm.get('stateId').touched && cityForm.get('stateId').errors">
      <div class="errorMessage">*Please choose state.</div>
    </div>
    </div>

   

    <!-- City Name -->
    <div class="col-md-4">
      <label class="">City Name</label>
      <input
        type="text"
        placeholder="Enter City Name"
        formControlName="cityName"
        maxlength="150"
        (input)="validateInput()"
      />
      <!-- <span class="note">Note: Add multiple cities separated by comma (,)</span> -->
        <div *ngIf="cityForm.get('cityName').touched && cityForm.get('cityName').errors">
      <div *ngIf="cityForm.get('cityName').errors.required" class="errorMessage">
        *Please enter city name.
      </div>
      <div *ngIf="cityForm.get('cityName').errors.invalidString" class="errorMessage">
        *Numbers are not allowed.
      </div>
      <div *ngIf="cityForm.get('cityName').errors.startOrEndSpace" class="errorMessage">
        *No space at start or end.
      </div>
    </div>
    </div>

   

    <!-- Latitude -->
    <!-- <div class="col-md-4">
      <label class="">Latitude</label>
      <input type="text" formControlName="latitude" placeholder="Enter Latitude">
    </div> -->

    <!-- Longitude -->
   <!-- <div class="col-md-4">
      <label class="">Longitude</label>
      <input type="text" formControlName="longitude" placeholder="Enter Longitude">
    </div> -->
<!-- Status Toggle -->
<!-- Status Toggle -->
<div class="col-md-4">
  <label>Status</label>

  <div class="toggleSwitch">
    <mat-slide-toggle
      formControlName="status"
      (change)="onStatusChange($event)"
    >
      {{ cityForm.get('status').value === 1 ? 'Active' : 'Inactive' }}
    </mat-slide-toggle>
  </div>
</div>
</div>
    <!-- Submit -->
    <div class="saveButton my-3">
      <button type="submit" class="btn btn-primary">Save</button>
    </div>

  </form>
</div>
