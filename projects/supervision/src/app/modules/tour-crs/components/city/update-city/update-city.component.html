<div class="card adminInner">
    <div class="card-header mb-3">
        <h5>Edit Package City</h5>
    </div>
    <div >
        <form [formGroup]="cityForm" (ngSubmit)="onCitySave()">
            <div class="form-row">
            <div class="col-md-4">
                <div class="cityInput">
                <label for="city" class="" > Tour City</label>
                <input type="text" class="form-control ml-0" placeholder="Enter Package City"  formControlName="cityName" maxlength="150" (input)="validateInput()">
                </div>
                <div *ngIf="cityForm.controls.cityName.errors && cityForm.controls.cityName.touched">
                    <div  *ngIf="cityForm.controls.cityName.errors.required" class="errorMessage">
                    *Please enter updated tour city name.
                    </div>
                    <div *ngIf="cityForm.controls.cityName.errors.invalidString" class="errorMessage">
                        *Number(s) are not allowed.
                    </div>
                    <div *ngIf="cityForm.controls.cityName.errors.startOrEndSpace"  class="errorMessage">
                        *Empty space(s) in start and end are not allowed.
                    </div>
                </div>

            </div>
            

            <div class="col-md-4">
                      <label style="display: block;">&nbsp;</label>
                    <div class="d-flex align-items-center">
                       
                         <button  class="btn btn-sm btn-primary mr-2">{{'Save'}}</button>
                         <button class="btn btn-sm btn-secondary packageBtn" routerLink="/tour-crs/city"> {{'Package City'}}  </button>
                    </div>
            </div>
            </div>
            
        </form>
    </div>
</div>
