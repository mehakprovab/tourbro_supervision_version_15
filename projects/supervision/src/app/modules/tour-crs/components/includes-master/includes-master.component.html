<div class="">
    <div class="">
        <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange(false)" #tabs
            [activeId]="activeIdString">
            <ngb-tab id="add_update_staticPage">
                <ng-template ngbTabTitle>
                    <span> Include Master </span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-add-update-include-master (staticContentTab)="triggerTab($event)"></app-add-update-include-master>
                </ng-template>
            </ngb-tab>
            <ngb-tab id="staticpage_list">
                <ng-template ngbTabTitle>
                    <span>Include Master List</span>
                </ng-template>
                <ng-template ngbTabContent>
                    <app-include-master-list (staticContentTab)="triggerTab($event)"></app-include-master-list>
                </ng-template>
            </ngb-tab>
        </ngb-tabset>
    </div>
</div>
