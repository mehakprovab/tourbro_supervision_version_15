<div class="col-12 p-0">
  <form [formGroup]="stateForm" (ngSubmit)="onStateSave()">
<div class="form-row">
    <!-- Country Dropdown -->
    <div class="col-md-4">
      <label class="">Choose Country</label>
      <select class="form-control" formControlName="country_id">
        <option value="" disabled>Select Country</option>
        <option *ngFor="let country of countryList" [value]="country.id">
          {{ country.name }}
        </option>
      </select>
      <div *ngIf="f.country_id.touched && f.country_id.errors">
      <small class="text-danger">*Please select country</small>
    </div>

    </div>

    
    <!-- State Name -->
    <div class="col-md-4">
      <label class="">State Name</label>
      <input type="text" class="form-control" formControlName="name" maxlength="150">
       <div *ngIf="f.name.touched && f.name.errors">
      <small *ngIf="f.name.errors.required" class="text-danger">*State name required</small>
      <small *ngIf="f.name.errors.invalidString" class="text-danger">*Numbers not allowed</small>
      <small *ngIf="f.name.errors.startOrEndSpace" class="text-danger">*No space at start/end</small>
    </div>
    </div>

   

    <!-- ISO Code -->
    <div class="col-md-4">
      <label class="">ISO Code</label>
      <input type="text" class="form-control" formControlName="iso2" maxlength="3">
       <div *ngIf="f.iso2.touched && f.iso2.errors">
      <small *ngIf="f.iso2.errors.required" class="text-danger">*ISO code required</small>
      <small *ngIf="f.iso2.errors.pattern" class="text-danger">*Must be 2–3 uppercase letters (e.g. KA)</small>
    </div>
    </div>

   

    <!-- Latitude -->
    <div class="col-md-4">
      <label class="">Latitude</label>
      <input type="text" class="form-control" formControlName="latitude">
       <div *ngIf="f.latitude.touched && f.latitude.errors">
      <small *ngIf="f.latitude.errors.pattern" class="text-danger">*Invalid latitude</small>
    </div>
    </div>

   

    <!-- Longitude -->
     <div class="col-md-4">
      <label class="">Longitude</label>
      <input type="text" class="form-control" formControlName="longitude">
      <div *ngIf="f.longitude.touched && f.longitude.errors">
      <small *ngIf="f.longitude.errors.pattern" class="text-danger">*Invalid longitude</small>
    </div>
    </div>

   
   
</div>
 <div class="mt-3">
        
      <button type="submit" class="btn btn-primary">Save State</button>
    </div>
  </form>
</div>
