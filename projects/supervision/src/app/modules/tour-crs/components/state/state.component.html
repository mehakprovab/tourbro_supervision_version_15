<div class="card adminInner">
  <div class="card-header mb-3">
    <h5>State</h5>
    <!-- <button class="orangeButton" (click)="onAddButtonClicked()">Add</button> -->
  </div>

  <!-- ✅ ADD STATE FORM -->
   
    <!-- *ngIf="enabledForm && !editForm" -->
  <app-add-state (insertedRecord)="insertedRecordReceived()"></app-add-state>


<div class="entireScreen">

  <!-- Search -->
   <div class="form-group col-sm-3 p-0 mb-3 float-right has-search">
            Full text search:
            <input class="form-control ml-0" type="text" name="Search" [(ngModel)]="searchText" 
            placeholder="Search">
     </div>
 <div class="wrapper1" id="notifications-list" (scroll)="scrollTwo.scrollLeft = scrollOne.scrollLeft" #scrollOne >
        <div class="div1"></div>
   </div>
   <div class="wrapper2" #scrollTwo (scroll)="scrollOne.scrollLeft = scrollTwo.scrollLeft">
        <div *ngIf="!editForm" class="div2 invisible-scrollbar">
  <!-- Table -->
  <div class="table-responsive">

    <table class="table table-striped table-hover" matSort (matSortChange)="sortData($event)">

      <thead>
        <tr>
          <th *ngFor="let header of displayColumn" mat-sort-header="{{header}}">
            {{ header }}
          </th>
        </tr>
      </thead>

      <tbody>

        <tr *ngIf="!searchSpin && !stateDataList.length">
          <td colspan="4" class="text-center">No Data Found!</td>
        </tr>

        <tr *ngFor="let item of stateDataList | filter:searchText | slice:(page-1)*pageSize:(page-1)*pageSize+pageSize; let i=index">

          <td>{{ i + 1 }}</td>

          <td>{{ item.name }}</td>

          <td [ngStyle]="{ color: item.status == 1 ? 'green' : 'red' }">
            {{ item.status == 1 ? 'Active' : 'Inactive' }}
          </td>

          <td>
            <button class="btn btn-sm btn-primary mr-2"
              [routerLink]="['/tour-crs/state/update', item.id]"
          >
              Edit
            </button>

            <button class="btn btn-sm btn-secondary"
              (click)="onDeletedRecord(item)">
              Delete
            </button>
          </td>

        </tr>

      </tbody>
    </table>

    <!-- Pagination -->
    <div class="d-flex justify-content-between mt-2">
      <ngb-pagination
        [collectionSize]="collectionSize"
        [(page)]="page"
        [pageSize]="pageSize">
      </ngb-pagination>

      <select [(ngModel)]="pageSize">
        <option [ngValue]="100">100</option>
        <option [ngValue]="200">200</option>
        <option [ngValue]="500">500</option>
      </select>
    </div>

  </div>
  </div>
  </div>

</div>
</div>
