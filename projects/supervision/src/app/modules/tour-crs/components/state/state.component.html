<div class="entireScreen p-0 col-md-12 col-lg-12">
  <div class="heading">
    <p>State</p>
    <button class="orangeButton" (click)="onAddButtonClicked()">Add</button>
  </div>

  <!-- ✅ ADD STATE FORM -->
  <app-add-state
    *ngIf="enabledForm && !editForm"
    (insertedRecord)="insertedRecordReceived()">
  </app-add-state>
</div>

<div class="entireScreen">

  <!-- Search -->
  <div class="form-group mb-0 col-sm-3 p-0 float-right search">
    <input class="form-control" type="text"
      [(ngModel)]="searchText"
      placeholder="Search">
  </div>

  <!-- Table -->
  <div class="table-responsive">

    <table class="table table-striped table-hover" matSort (matSortChange)="sortData($event)">

      <thead>
        <tr>
          <th *ngFor="let header of displayColumn" mat-sort-header="{{header}}">
            {{ header }}
          </th>
        </tr>
      </thead>

      <tbody>

        <tr *ngIf="!searchSpin && !stateDataList.length">
          <td colspan="4" class="text-center">No Data Found!</td>
        </tr>

        <tr *ngFor="let item of stateDataList | filter:searchText | slice:(page-1)*pageSize:(page-1)*pageSize+pageSize; let i=index">

          <td>{{ i + 1 }}</td>

          <td>{{ item.name }}</td>

          <td [ngStyle]="{ color: item.status == 1 ? 'green' : 'red' }">
            {{ item.status == 1 ? 'Active' : 'Inactive' }}
          </td>

          <td>
            <button class="btn btn-sm btn-primary mr-1"
              [routerLink]="['/tour-crs/state/update', item.id]"
          >
              Edit
            </button>

            <button class="btn btn-sm btn-primary mr-1"
              (click)="onDeletedRecord(item)">
              Delete
            </button>
          </td>

        </tr>

      </tbody>
    </table>

    <!-- Pagination -->
    <div class="d-flex justify-content-between mt-2">
      <ngb-pagination
        [collectionSize]="collectionSize"
        [(page)]="page"
        [pageSize]="pageSize">
      </ngb-pagination>

      <select [(ngModel)]="pageSize">
        <option [ngValue]="100">100</option>
        <option [ngValue]="200">200</option>
        <option [ngValue]="500">500</option>
      </select>
    </div>

  </div>
</div>
