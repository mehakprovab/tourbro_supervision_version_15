<div class="entireScreen  p-0 col-md-12 col-lg-12">
    <div class="heading">
        <p>{{'Departure Date List : [ Tour Name : ' + tourName + ']'}}</p>
    </div>
    <!-- <div *ngIf="" class="checkboxNotification" style="text-align: center;">
        <input type="checkbox" id="skipToNext">
        <label for="skipToNext">Would you like to skip adding the departure date list?</label>
    </div>       -->
    <app-add-departure-date  (insertedRecord)="insertedRecordReceived()"> </app-add-departure-date>
    <div class="wrapper1" id="notifications-list" (scroll)="scrollTwo.scrollLeft = scrollOne.scrollLeft" #scrollOne >
        <div class="div1"></div>
   </div>
    <div class="wrapper2" #scrollTwo (scroll)="scrollOne.scrollLeft = scrollTwo.scrollLeft">
        <div class="div2 invisible-scrollbar">
            <div class="table-responsive">
                <table class="table table-borderless table-striped table-hover" matSort (matSortChange)="sortData($event)">
                    <thead>
                        <tr class="p-2">
                        <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn" mat-sort-header="{{header}}">
                            {{ header }}
                        </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngIf="searchSpin">
                            <td colspan="12">
                                <mat-spinner [diameter]="30" style="margin:0 auto;"
                                    mode="indeterminate"></mat-spinner>
                            </td>
                        </tr>
                        <tr *ngIf="!searchSpin && !departureDateList.length">
                            <td colspan="11">
                                <h4 class="text-muted text-center">
                                    No Data Found!
                                </h4>
                            </td>
                        </tr>
                        <tr *ngFor="let item of departureDateList; let i=index">
                                <td class="text-left text-muted">{{'#' + (i+1) }}</td>
                                <td class="text-left">{{ item.dep_date | date: 'dd/MM/yyyy' }}</td>
                                <td class="text-left buttontdsize">
                                    <button class="btn btn-sm btn-primary mr-1" (click)="onDeletedRecord(item)"> {{'Delete'}}  </button>
                                </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            </div>
    </div>
</div>
