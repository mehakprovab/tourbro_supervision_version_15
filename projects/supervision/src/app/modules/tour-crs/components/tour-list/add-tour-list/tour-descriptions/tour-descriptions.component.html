<div class="entireScreen  p-0 col-md-12 col-lg-12">
    <div class="heading">
        <p>{{'Tour Descriptions : [ Tour Name :' + tourName + ']'}}</p>
    </div>      
    <div style="padding: 20px;">
        <div class="add-traveller">
            <div class="custom-inline-form">
                <form class="" [formGroup]="tourDescriptionsForm" autocomplete="off" (ngSubmit)="onSubmitTourDescriptionsForm()">
                    <div class="form-group required row">
                        <label for="highlights" class="col-sm-2 col-form-label font-weight-bold">Highlights</label>
                        <div class="col-sm-10">
                            <ckeditor formControlName="highlights"></ckeditor>
                        </div>
                    </div>
                    <div class="form-group required row">
                        <label for="inclusions" class="col-sm-2 col-form-label font-weight-bold">Inclusions<sup
                            class="text-danger f-16"> * </sup> </label>
                        <div class="col-sm-10">
                            <ckeditor formControlName="inclusions"></ckeditor>
                        </div>
                    </div>
                    <div class="form-group required row">
                        <label for="exclusions" class="col-sm-2 col-form-label font-weight-bold">Exclusions</label>
                        <div class="col-sm-10">
                            <ckeditor formControlName="exclusions"></ckeditor>
                        </div>
                    </div>
                    <div class="form-group required row">
                        <label for="termsConditions" class="col-sm-2 col-form-label font-weight-bold">Terms & Conditions</label>
                        <div class="col-sm-10">
                            <ckeditor formControlName="termsConditions"></ckeditor>
                        </div>
                    </div>

                    <div class="form-group required row">
                        <label for="MeetingPoint" class="col-sm-2 col-form-label font-weight-bold">Meeting Point<sup
                            class="text-danger f-16"> * </sup></label>
                        <div class="col-sm-10">
                            <textarea type="number" class="form-control" id="MeetingPoint" cols="24"
                                formControlName="MeetingPoint" placeholder="MeetingPoint"></textarea>
                        </div>
                    </div>
                    <div class="faq-section mt-4">
  <h4>FAQs</h4>

  <div formArrayName="faqs">

    <div *ngFor="let faq of faqs.controls; let i = index" [formGroupName]="i" class="row mb-3">

      <div class="col-5">
        <input type="text" class="form-control"
          formControlName="question" placeholder="Enter Question">

        <small class="text-danger" *ngIf="faq.get('question').touched && faq.get('question').invalid">
          Question is required
        </small>
      </div>

      <div class="col-5">
        <textarea class="form-control"
          formControlName="answer" placeholder="Enter Answer"></textarea>

        <small class="text-danger" *ngIf="faq.get('answer').touched && faq.get('answer').invalid">
          Answer is required
        </small>
      </div>

      <div class="col-2 d-flex align-items-center">
        <button type="button" class="btnStyle mr-2" (click)="addFaq()" *ngIf="i === 0">Add</button>
        <button type="button" class="btnStyle remove-btn" (click)="removeFaq(i)">Remove</button>
      </div>

    </div>

    <button type="button" class="btnStyle" (click)="addFaq()" *ngIf="faqs.length === 0">
      Add FAQ
    </button>

  </div>

  <!-- ✅ SEPARATE SAVE BUTTON -->
  <div class="mt-3">
    <button type="button" class="orangeButton" (click)="saveFaqs()">
      Save FAQs
    </button>
  </div>

</div>

                    <div>
                        <label for="bannerImage" class="col-sm-2 col-form-label font-weight-bold smAlign">Banner Image<sup
                            class="text-danger f-16"> * </sup> </label>
                        <input type="file" id="bannerImage" (change)="onImageSelect($event)" accept=".png,.jpg,.jpeg"><br>
                        <span><b>Note:</b> Only JPG, JPEG and PNG formats are allowed.</span><br>
                    </div>
                    <div>
                        <label for="uploadGallery" class="col-sm-2 col-form-label font-weight-bold smAlign">Upload Gallery<sup
                            class="text-danger f-16"> * </sup> </label>
                        <input type="file" id="uploadGallery" multiple (change)="onGallerySelect($event)" accept=".png,.jpg,.jpeg"><br>
                        <span><b>Note:</b> Only JPG, JPEG and PNG formats are allowed.</span><br>
                    </div>

                    </div> -->
                    <div class="saveButton">
