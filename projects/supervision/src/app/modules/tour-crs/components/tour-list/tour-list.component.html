<div class="card adminInner">
<div class="tab-buttons mb-3">
  <button 
    class="tab-btn"
    [ngClass]="activeTab === 'list' ? 'active' : 'inactive'"
    (click)="setTab('list')">
    List Yatra
  </button>

  <button 
    class="tab-btn"
    [ngClass]="activeTab === 'add' ? 'active' : 'inactive'"
    (click)="setTab('add')">
    Create Yatra
  </button>
</div>
    <div class="card-header">
        <h5>Yatra List</h5> 
       
    </div>
  


<div class="entireScreen">
    <div class="form-group col-sm-3 p-0 mb-3 float-right has-search">
            Full text search:
            <input class="form-control ml-0" type="text" name="Search" [(ngModel)]="searchText" autocomplete="off"
            placeholder="Search">
     </div>
    
    <div class="wrapper1" id="notifications-list" (scroll)="scrollTwo.scrollLeft = scrollOne.scrollLeft" #scrollOne >
        <div class="div1"></div>
   </div>
    <div class="wrapper2" #scrollTwo (scroll)="scrollOne.scrollLeft = scrollTwo.scrollLeft">
        <div *ngIf="!editForm" class="div2 invisible-scrollbar">
        <div class="table-responsive">
              <table class="table table-borderless table-striped table-hover" matSort (matSortChange)="sortData($event)">
                  <thead>
                      <tr class="p-2">
                      <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn" mat-sort-header="{{header}}"> 
                          {{ header }}
                      </th>
                      </tr>
                  </thead>
                  <tbody>
                    <tr *ngIf="searchSpin">
                        <td colspan="12">
                            <mat-spinner [diameter]="30" style="margin:0 auto;"
                                mode="indeterminate"></mat-spinner>
                        </td>
                    </tr>
                    <tr *ngIf="!searchSpin && !toursDataList.length">
                        <td colspan="11">
                            <h4 class="text-muted text-center">
                                No Data Found!
                            </h4>
                        </td>
                    </tr>
                      <tr *ngFor="let item of toursDataList | filter:searchText | slice: (page - 1) * pageSize : (page - 1) * pageSize + pageSize; let i=index">
                              <td class="text-left text-muted">{{(i+1) }}</td>
                              <td class="text-left">{{ item.tour_name }}</td>
                              <td class="text-left">{{ item.tour_type }}</td>
                              <td class="text-left">{{ item.country_name }}</td>
                              <td class="text-left">{{ item.city_name }}</td>
                              <td class="text-left">{{ item.duration }}</td>
                              <td class="text-left">{{ item.supplier_name }}</td>
                              <!-- <td class="text-left">{{
                                    item.selling_b2b === 1 && item.selling_b2c === 1
                                    ? 'B2B, B2C'
                                    : item.selling_b2b === 1
                                        ? 'B2B'
                                        : item.selling_b2c === 1
                                        ? 'B2C'
                                        : '-'
                                }}</td> -->
                              <td class="text-left">{{ item.start_date | date: 'dd/MM/yyyy'  }}</td>
                              <td class="text-left">{{ item.expire_date | date: 'dd/MM/yyyy'  }}</td>
                              <td class="text-left">
                                <label class="checkbox-label justify-content-start">
                                    <input type="checkbox" class="checkbox-input" [checked]="item.publish_status==1" (change)="onPublish($event.target.checked,item)">
                                    <span class="checkbox-text">Publish</span>
                                </label> 
                              </td>
                              <!-- <td class="text-left">
                                <label class="checkbox-label">
                                    <input type="checkbox" class="checkbox-input" [checked]="item.home_status==1" (change)="onHomePublish($event.target.checked,item)">
                                    <span class="checkbox-text">Home Publish</span>
                                </label> 
                              </td> -->
                              <!-- <td class="text-left" *ngIf="loggedInAuthId !== 7">
                                <label class="checkbox-label">
                                    <input type="checkbox" class="checkbox-input" [checked]="item.trending==1" (change)="enableTrending($event.target.checked,item)">
                                    <span class="checkbox-text">Enable</span>
                                </label> 
                              </td> -->
                              <!-- <td class="text-left" *ngIf="loggedInAuthId !== 7">
                                <label class="checkbox-label">
                                    <input type="checkbox" class="checkbox-input" [checked]="item.enquiry_status==1" (change)="enableEnquiryForm($event.target.checked,item)">
                                    <span class="checkbox-text">Enable</span>
                                </label> 
                              </td> -->
                               <td class="text-left" *ngIf="loggedInAuthId !== 7">
                                <label class="checkbox-label">
                                    <input type="checkbox" class="checkbox-input" [checked]="item.booknow_status==1" (change)="enableBookNow($event.target.checked,item)" >
                                    <span class="checkbox-text">Enable</span>
                                </label> 
                              </td>
                              <td class="text-left overflow-hidden">
                                <div ngbDropdown container="body"><button class="btnStyle" ngbDropdownToggle>
                                        {{'Action'}}
                                    </button>
                                    <div ngbDropdownMenu>
                                        <a ><button type="button"
                                              (click)="price(item)"  ngbDropdownItem>Price Management</button></a>
                                        <a ><button type="button" (click)="updateTourPackage(item.id)"
                                                ngbDropdownItem>Edit</button></a>
                                        <a ><button type="button" (click)="updateTourItinerary(item)"
                                                ngbDropdownItem>Edit Itinerary</button></a>
                                        <!-- <a ><button type="button" (click)="updateDepartureDate(item)"
                                                ngbDropdownItem>Dep Dates</button></a> -->
                                        <a ><button type="button" (click)="cityDetails(item)"
                                                ngbDropdownItem>Cities</button></a> 
                                        <a ><button type="button" (click)="DeleteTourRecord(item.id)"
                                                ngbDropdownItem>Delete</button></a>
                                        <!-- <a ><button type="button" (click)="brochureDetails(item.id)"
                                                ngbDropdownItem>Brochure</button></a>     -->
                                    </div>
                                </div>
                            </td>
                      </tr>
                  </tbody>
              </table>
              <div class="card-footer pb-0">
                <div class="d-flex w-100 justify-content-between">
                    <ngb-pagination [collectionSize]="collectionSize" [(page)]="page" [maxSize]="5" [pageSize]="pageSize">
                    </ngb-pagination>
                    <select class="custom-select" style="width: auto" name="pageSize" [(ngModel)]="pageSize">
                        <option [ngValue]="100">100 items per page</option>
                        <option [ngValue]="150">150 items per page</option>
                        <option [ngValue]="200">200 items per page</option>
                        <option [ngValue]="500">500 items per page</option>
                        <option [ngValue]="700">700 items per page</option>
                        <option [ngValue]="1000">1000 items per page</option>
                    </select>
                </div>
              </div>
          </div>
        </div>
    </div>
</div>
</div>
