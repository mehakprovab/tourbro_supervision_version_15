    <div class="card-header mb-3">
        <h5>Update Yatra Manager</h5>
    </div>
    

    <div class="add-traveller">

                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="tourId" maxlength="50"
                        formControlName="tourId" disabled>
                    </div>
                </div>
                <div class="form-group required row">
                    <label for="tourName " class="required" class="col-sm-2 col-form-label ">Tour Name <sup
                        class="text-danger f-16"> * </sup> </label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="tourName" maxlength="50"
                            formControlName="tourName" placeholder="Enter Tour Name">

                    </div>
                </div>

                <div class="form-group required row">
                    <label for="tourDescription " class="required" class="col-sm-2 col-form-label ">Tour Description </label>
                    <div class="col-sm-4">
                        <textarea type="text" class="form-control" id="tourDescription" 
                            formControlName="tourDescription" placeholder="Enter Tour Description"></textarea>

                    </div>
                </div>
                <div class="form-group required row">
                    <label for="startDate" class="required" class="col-sm-2 col-form-label ">Start Date <sup
                        class="text-danger f-16"> * </sup> </label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="startDate"
                        formControlName="startDate" [bsConfig]="{ minDate: minDate, dateInputFormat: 'DD/MM/YYYY' }"
                        bsDatepicker placeholder="dd/mm/yyyy">

                    </div>
                </div>
                <div class="form-group required row">
                    <label for="expirayDate" class="required" class="col-sm-2 col-form-label ">Expiray Date <sup
                        class="text-danger f-16"> * </sup> </label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="expirayDate"
                        formControlName="expirayDate" [bsConfig]="{ minDate: minExpireDate, dateInputFormat: 'DD/MM/YYYY' }"
                        bsDatepicker placeholder="dd/mm/yyyy">

                    </div>
                </div>
                <div class="form-group required row">
                    <label for="supplierName " class="required" class="col-sm-2 col-form-label ">Supplier Name </label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="supplierName" maxlength="50"
                        formControlName="supplierName" placeholder="Enter Supplier Name">

                    </div>
                </div>

                <div class="form-group required row">
                    <label for="chooseActivity  " class="required" class="col-sm-2 col-form-label ">Choose Activity </label>
                    <div class="col-sm-4 boxInputList">
                        <ul>
                            <li *ngFor="let activity of activitiesList"  (click)="selectActivity(activity)">
                                {{activity.tour_activity}}
                            </li>
                        </ul>
                    </div>
                    <div class="directionSymbol">
                        <div>{{'>>'}}</div>
                        <div>{{'<<'}}</div>
                    </div>
                    <div class="col-sm-4 boxInputList">
                        <ul>
                            <li *ngFor="let activity of selectedtActivity" (click)="deSelectActivity(activity)">
                                {{activity.tour_activity}}
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="form-group required row">
                    <label for="chooseTheme  " class="required" class="col-sm-2 col-form-label ">Choose Theme </label>
                    <div class="col-sm-4 boxInputList">
                        <ul>
                            <li *ngFor="let theme of themeList"  (click)="selectTheme(theme)">
                                {{theme.tour_subtheme}}
                            </li>
                        </ul>
                    </div>
                    <div class="directionSymbol">
                        <div>{{'>>'}}</div>
                        <div>{{'<<'}}</div>
                    </div>
                    <div class="col-sm-4 boxInputList">
                        <ul>
                            <li *ngFor="let theme of selectedTheme" (click)="deSelectTheme(theme)">
                                {{theme.tour_subtheme}}
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="form-group required row">
                    <label for="region  " class="required" class="col-sm-2 col-form-label ">Choose Region</label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="region" maxlength="50"
                        formControlName="region"  disabled>
                    </div>
                </div>
                <div class="form-group required row">
                    <label for="theme" class="required" class="col-sm-2 col-form-label ">Choose Duration </label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control" id="theme" maxlength="50"
                        formControlName="duration" disabled>
                    </div>
                </div>

                    <label for="highlights" class="col-sm-2 col-form-label ">Highlights</label>
                    <div class="col-sm-10">
                        <ckeditor formControlName="highlights"></ckeditor>
                    </div>
                </div>
                <div class="form-group required row">
                    <label for="inclusions" class="col-sm-2 col-form-label ">Inclusions</label>

                <div class="form-group required row">
                    <label for="termsConditions" class="col-sm-2 col-form-label ">Terms & Conditions</label>

                    </div>

                    <label for="MeetingPoint" class="col-sm-2 col-form-label ">Meeting Point</label>
                    <div class="col-sm-10">

                    </div>
                </div>
                <div class="form-group row">
                    <label for="endCity" class="col-sm-2 col-form-label ">End Point</label>

                    </div>

                <div >
                    <div style="display: flex;" class="form-group required row">
                        <div class="col-sm-2">
                            <label for="bannerImage" class="" > Banner Image</label>
                        </div>
                        <div class="col-sm-6 ">
                            <a  class="bannerImage" href="{{getImage()}}" target="_blank"><img class="bannerImage" width="450"
                                [src]="getImage()" alt=""></a>
                        </div>
                    </div>
                    <div>
                        <label for="bannerImage" class="col-sm-2 px-0">Change Banner Image</label>
                        <input class="col-sm-6 px-0" type="file" id="bannerImage" (change)="onImageSelect($event)"  accept=".png,.jpg,.jpeg,.svg,.webp"><br>
                        <span class="col-md-4 offset-md-2 px-0"><b>Note:</b> Only JPG, JPEG and PNG formats are allowed.</span><br>
                    </div>
                </div>
                <div class="row pt-4">
                <div class="col-sm-2 d-flex align-items-center"><label  class="" >Upload Video</label></div>
                <!-- Video Option Selection -->
<div class="col-sm-6 d-flex align-items-center">
<label class="mr-3 mb-0">
<input type="radio"
        name="videoType"
        value="upload"
        [(ngModel)]="videoType"
        [ngModelOptions]="{standalone: true}">
Upload Video
</label>

<label class="mb-0">
<input type="radio"
        name="videoType"
        value="youtube"
        [(ngModel)]="videoType"
        [ngModelOptions]="{standalone: true}">
YouTube Link
</label>
</div>
</div>
<!-- Upload Video -->
<div *ngIf="videoType === 'upload'" class="form-group row">
<div class="col-sm-2">
<label class="">Upload Video</label>
</div>

<div class="col-sm-6">
<input type="file" (change)="onVideoSelect($event)" accept="video/*">
</div>
</div>

<!-- YouTube Link -->
<div *ngIf="videoType === 'youtube'" class="form-group row">
<div class="col-sm-2">
<label class="">YouTube Link</label>
</div>

<div class="col-sm-6">
<input type="text"
    class="form-control"
    [(ngModel)]="youtubeLink"
    [ngModelOptions]="{standalone: true}"
    placeholder="Enter YouTube URL">
</div>
</div>

                <div class="row pt-4">
                    <div class="col-sm-2">
                        <label for="uploadGallery" class="">Gallery</label>
                    </div>
                    <div class="col-sm-10">
                        <ul class="imageList">
                        <li *ngFor="let imageName of galleryImages">
                            <div class="image-container">
                            <img class="galleryImageItem" width="250" [src]="getGalleryImage(imageName)" alt="Gallery Image">
                            <button class="delete-btn" (click)="deleteGalleryImage(imageName)">❌</button>
                            </div>
                        </li>
                        </ul>
                    </div>
                   
                    </div>
                     <div class="row pt-4">
                        <div class="col-sm-2">
                            <label for="uploadGallery" class="">Upload Gallery</label>
                        </div>
                        <div class="col-sm-10">
                            <input class="col-sm-4 px-0" type="file" id="uploadGallery" multiple (change)="onGallerySelect($event)" accept=".png,.jpg,.jpeg,.svg,.webp"><br>
                            <span><b>Note:</b> Only JPG, JPEG and PNG formats are allowed.</span><br>

                        </div>
                        
                        
                    </div>

                <div class="form-group my-3">

                        <button type="reset" class="btn btn-sm btn-secondary" routerLink="/tour-crs/tour-list">Go Back to Tour list</button>
                    </div>
