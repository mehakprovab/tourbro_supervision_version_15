<div class="card adminInner">
    <div class="card-header mb-3">
        <h5>{{'Car Amenity List'}}</h5>
    </div>
    <form>
         <div class="form-group col-sm-3 p-0 mb-3 float-right has-search">
            Full text search:
            <input class="form-control mr-3" type="text" name="searchTerm" (keyup)="applyFilter($event.target.value)" />
         </div>
       
        <div class="table-responsive">
            <table class="table table-borderless table-striped table-hover" matSort (matSortChange)="sortData($event)">
                <thead>
                    <tr>
                        <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn;"
                            mat-sort-header="{{header.key}}">
                            {{header.value }} </th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngIf="noData">
                        <td colspan="11">
                            <mat-spinner [diameter]="30" style="margin:0 auto;" mode="indeterminate"></mat-spinner>
                        </td>
                    </tr>
                    <tr
                        *ngFor="let data of respData | slice: (page - 1) * pageSize : (page - 1) * pageSize + pageSize; let i=index;">
                        <td class="text-left text-muted">{{i+1}}.</td>
                        <td class="text-left"> {{data['amenties']}} </td>
                        <td>
                            <span title="Slide for Active/Deactive">
                                <mat-slide-toggle  class="example-margin" [color]="''"
                                   [(ngModel)]="data['status']" name="status{{i}}"
                                    (change)="onStatusUpdate(data, i)">
                                </mat-slide-toggle>
                            </span>
                        </td>
                        <td class="text-left btncontainer">
                                <button  class="btn-primary mr-2" (click)="updateRoomAmenity(data)">{{'Update'}}</button>&nbsp;
                                <button class="btn-secondary" (click)="deleteRoomAmenity(data)">{{'Delete'}}</button>
                        </td>

                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer pb-0">
            <div class="d-flex w-100 justify-content-between">
                <ngb-pagination [collectionSize]="collectionSize" [maxSize]="12" [rotate]="true" [boundaryLinks]="true" [(page)]="page"
                    [pageSize]="pageSize">
                </ngb-pagination>
                <select class="custom-select" style="width: auto" name="pageSize" [(ngModel)]="pageSize">
                    <option [ngValue]="10">10 items per page</option>
                    <option [ngValue]="20">20 items per page</option>
                    <option [ngValue]="50">50 items per page</option>
                </select>
            </div>
        </div>
    </form>
</div>
