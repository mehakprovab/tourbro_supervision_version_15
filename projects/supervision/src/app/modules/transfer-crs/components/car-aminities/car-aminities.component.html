<ul
  ngbNav
  #tabs="ngbNav"
  [(activeId)]="activeIdString"
  (navChange)="beforeChange($event)"
  class="nav-tabs tabs-animated custom_tab crs-tab-ui">

  <li [ngbNavItem]="'list_room_amenity'">
    <a ngbNavLink>List Car Amenity</a>
    <ng-template ngbNavContent>
      <app-car-aminities-list
        (toUpdate)="triggerTab($event)">
      </app-car-aminities-list>
    </ng-template>
  </li>

  <li [ngbNavItem]="'add_room_amenity'">
    <a ngbNavLink>Add/Edit Car Amenity</a>
    <ng-template ngbNavContent>
      <app-add-aminities
        (someEvent)="triggerTab($event)"
        [roomAmenityOne]="roomAmenityData">
      </app-add-aminities>
    </ng-template>
  </li>

</ul>

<div [ngbNavOutlet]="tabs" class="mt-3"></div>
