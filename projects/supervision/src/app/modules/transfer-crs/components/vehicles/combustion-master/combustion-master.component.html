<div class="entireScreen p-0 col-md-12 col-lg-12">

  <!-- HEADER -->
  <div class="col-12 row" style="margin-top: 5px;margin-bottom: 5px;">
    <div class="heading col-6">
      <p>Combustion Master</p>
    </div>
  </div>

  <!-- FORM -->
  <div class="card" *ngIf="enabledForm">
    <form [formGroup]="form" (ngSubmit)="saveText === 'Save' ? onSave() : onUpdate()">

      <div class="form-group row">

        <!-- TYPE -->
        <div class="col-6">
          <label class="px-3 control-label">
            Type <span class="text-danger">*</span>
          </label>
          <div class="col-sm-12">
            <input
              type="text"
              class="form-control"
              formControlName="type"
              placeholder="Enter Type"
              [class.is-invalid]="form.get('type').invalid && (form.get('type').dirty || isSubmitted)"
            />

            <div *ngIf="form.get('type').invalid && (form.get('type').dirty || isSubmitted)" class="invalid-feedback">
              <span *ngIf="form.get('type').errors?.required">Type is required</span>
              <span *ngIf="form.get('type').errors?.pattern">Only characters allowed</span>
            </div>
          </div>
        </div>

        <!-- STATUS -->
        <div class="col-6" *ngIf="saveText == 'Save'">
          <label class="px-3 control-label">Status</label>
          <div class="col-sm-12 d-flex align-items-center">
            <mat-slide-toggle formControlName="status">
              {{ form.get('status')?.value ? 'Active' : 'Inactive' }}
            </mat-slide-toggle>
          </div>
        </div>

      </div>

      <!-- BUTTONS -->
      <div class="saveButton">
        <button type="submit" class="btnStyle save-btn">
          {{ saveText }}
        </button>

        <button type="button" class="btnStyle ml-2" (click)="onCancel()">
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>

<!-- LIST HEADER -->
<div class="col-12 row">
  <div class="heading col-6">
    <p>Combustion List</p>
  </div>

  <div class="col-6 d-flex justify-content-end">
    <input
      class="form-control w-50"
      type="text"
      [(ngModel)]="searchText"
      placeholder="Search"
    />
  </div>
</div>

<!-- TABLE -->
<div class="entireScreen">
  <div class="table-responsive">
    <table class="table table-striped table-hover">

      <thead>
        <tr>
          <th>Sl.No</th>
          <th>Status</th>
          <th>Type</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>

        <!-- LOADER -->
        <tr *ngIf="loading">
          <td colspan="4" class="text-center">
            <mat-spinner [diameter]="30"></mat-spinner>
          </td>
        </tr>

        <!-- NO DATA -->
        <tr *ngIf="!loading && !list.length">
          <td colspan="4" class="text-center text-muted">
            No Data Found!
          </td>
        </tr>

        <!-- DATA -->
        <tr *ngFor="let item of list | filter: searchText | slice:(page-1)*pageSize:(page-1)*pageSize+pageSize; let i = index">
          
          <td>{{ i + 1 }}</td>

          <td>
            <mat-slide-toggle
              [(ngModel)]="item.status"
              (change)="onStatusChange($event, item.id)">
            </mat-slide-toggle>
          </td>

          <td>{{ item.type }}</td>

          <td>
            <button class="btn btn-sm btn-primary mr-1" (click)="onEdit(item)">
              Edit
            </button>

            <button class="btn btn-sm btn-primary" (click)="onDelete(item.id)">
              Delete
            </button>
          </td>

        </tr>

      </tbody>
    </table>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-between">
      <ngb-pagination
        [collectionSize]="collectionSize"
        [(page)]="page"
        [pageSize]="pageSize">
      </ngb-pagination>

      <select class="custom-select w-auto" [(ngModel)]="pageSize">
        <option [ngValue]="20">20</option>
        <option [ngValue]="50">50</option>
        <option [ngValue]="100">100</option>
      </select>
    </div>

  </div>
</div>
