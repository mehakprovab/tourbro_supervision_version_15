<div class="card adminInner">

  <!-- HEADER -->
 
    <div class="card-header mb-3">
      <h5>Combustion Master</h5>
    </div>
  

  <!-- FORM -->
  <div class="mb-3" *ngIf="enabledForm">
    <form [formGroup]="form" (ngSubmit)="saveText === 'Save' ? onSave() : onUpdate()">

      <div class="form-group row">

        <!-- TYPE -->
        <div class="col-4">
          <label class="control-label">
            Type <span class="text-danger">*</span>
          </label>
         
            <input
              type="text"
              class="form-control"
              formControlName="type"
              placeholder="Enter Type"
              [class.is-invalid]="form.get('type').invalid && (form.get('type').dirty || isSubmitted)"
            />

            <div *ngIf="form.get('type').invalid && (form.get('type').dirty || isSubmitted)" class="invalid-feedback">
              <span *ngIf="form.get('type').errors?.required">Type is required</span>
              <span *ngIf="form.get('type').errors?.pattern">Only characters allowed</span>
            </div>
        
        </div>

        <!-- STATUS -->
        <div class="col-3" *ngIf="saveText == 'Save'">
          <label class="control-label">Status</label>
          
            <mat-slide-toggle formControlName="status">
              {{ form.get('status')?.value ? 'Active' : 'Inactive' }}
            </mat-slide-toggle>
        
        </div>
        <div class="col-3">
          <!-- BUTTONS -->
          <div class="saveButton">
            <label>&nbsp;</label>
            <button type="submit" class="btn-primary mr-2 save-btn">
              {{ saveText }}
            </button>

            <button type="button" class="btn-secondary" (click)="onCancel()">
              Cancel
            </button>
          </div>

        </div>

      </div>

      

    </form>
  </div>



<!-- TABLE -->
<div class="entireScreen">
   <div class="form-group col-sm-3 p-0 mb-3 float-right has-search">
            Full text search:
            <input class="form-control ml-0" type="text" name="Search" [(ngModel)]="searchText" autocomplete="off"
            placeholder="Search">
     </div>
  <div class="table-responsive">
    <table class="table table-striped table-hover">

      <thead>
        <tr>
          <th>Sl.No</th>
          <th>Status</th>
          <th>Type</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>

        <!-- LOADER -->
        <tr *ngIf="loading">
          <td colspan="4" class="text-center">
            <mat-spinner [diameter]="30"></mat-spinner>
          </td>
        </tr>

        <!-- NO DATA -->
        <tr *ngIf="!loading && !list.length">
          <td colspan="4" class="text-center text-muted">
            No Data Found!
          </td>
        </tr>

        <!-- DATA -->
        <tr *ngFor="let item of list | filter: searchText | slice:(page-1)*pageSize:(page-1)*pageSize+pageSize; let i = index">
          
          <td>{{ i + 1 }}</td>

          <td>
            <mat-slide-toggle
              [(ngModel)]="item.status"
              (change)="onStatusChange($event, item.id)">
            </mat-slide-toggle>
          </td>

          <td>{{ item.type }}</td>

          <td>
            <button class="btn btn-sm btn-primary mr-2" (click)="onEdit(item)">
              Edit
            </button>

            <button class="btn btn-sm btn-secondary" (click)="onDelete(item.id)">
              Delete
            </button>
          </td>

        </tr>

      </tbody>
    </table>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-between">
      <ngb-pagination
        [collectionSize]="collectionSize"
        [(page)]="page"
        [pageSize]="pageSize">
      </ngb-pagination>

      <select class="custom-select w-auto" [(ngModel)]="pageSize">
        <option [ngValue]="20">20</option>
        <option [ngValue]="50">50</option>
        <option [ngValue]="100">100</option>
      </select>
    </div>

  </div>
</div>
</div>
