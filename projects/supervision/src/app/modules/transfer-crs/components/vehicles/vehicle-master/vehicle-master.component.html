<div class="entireScreen  p-0 col-md-12 col-lg-12">
    <div class="col-12 row">
        <div class="heading col-6">
            <p>Vehicle Master</p>
            <!-- <button *ngIf="!editForm" class="orangeButton" type="submit" (click)="onAddButtonClicked()">Add</button> -->
        </div>
        

    </div>

    <div class="card" *ngIf="enabledForm && !editForm">
        <form [formGroup]="addUpdateVehcleForm" (ngSubmit)="saveTextName === 'Save' ? onVehicleMasterSave() : upateVehicleMaster()">
            <div class="form-group row">
                 <div class="col-4">
                            <label class="px-3 control-label" for="vehicle_name">
                                Vehicle Type
                            <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">
                                <select formControlName="vehicle_type" class="form-control"
                                placeholder="Select Vehicle Type">
                                    <option value="" disabled selected>Select Vehicle Type</option>
                                    <option *ngFor="let vehicle of vehiclesType" [value]="vehicle.id">
                                        {{vehicle.name}}
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="col-4">
                            <label class="px-3 control-label" for="vehicle_name">
                                Vehicle Name
                            <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">
                                <input value="" formControlName="vehicle_name" type="text" placeholder="Vehicle Name"
                                    class="form-control ml-0" 
                                    />
                            </div>
                        </div>
                        <div class="col-4">
                            <label class="px-3 control-label" for="max_capacity">
                                Capacity
                            <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">
                                <select formControlName="max_capacity" class="form-control"
                                    >
                                    <option value="" disabled selected>Venicle Capacity</option>
                                    <option *ngFor="let vehicle of seatCapacity" [value]="vehicle">
                                        {{vehicle}}
                                    </option>
                                </select>
                            </div>
                        </div>

                         <div class="col-4">
                            <label class="px-3 control-label" for="ac_vehicle">
                                Ac
                            <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">
                                <select formControlName="ac_vehicle" class="form-control"
                                    >
                                    <option value="" disabled selected>Vehicle Type</option>
                                    <option *ngFor="let vehicle of acType" [value]="vehicle.key">
                                        {{vehicle.key}}
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-4">
                            <label class="px-3 control-label" for="vehicle_name">
                                Category
                            <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">

                                <select formControlName="ratings" class="form-control"
                                    >
                                    <option value="" disabled selected>Select Category</option>
                                    <option *ngFor="let rating of ratingList" [value]="rating.key">
                                        {{rating.key}}
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="col-4">
                            <label class="px-3 control-label">
                            Ride Type
                                <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">
                                <select formControlName="ride_type" class="form-control"
                                    >
                                    <!-- <option value="" disabled selected>Select Ride Type</option> -->
                                    <option *ngFor="let ride of rideType" [value]="ride.key">
                                        {{ride.value}}
                                    </option>
                                </select>
                            </div>
                            
                        </div>


                         <div class="col-8">
                            <label class="px-3 control-label">
                                Luggage Allowances
                                <span class="text-danger">*</span>
                            </label>
                            <div class="col-sm-12">
                                <textarea value="" cols="24" formControlName="luggage_allowances" type="text" placeholder="Luggage Allowances"
                                    class="form-control"
                                     > </textarea>
                            </div>
                        </div>

                        <div class="col-4">
                    <!-- <div class="form-group">
                        <label class="col-sm-3 control-label" for="status">
                            Status
                            <span class="text-danger">*</span>
                        </label>
                        <div class="col-4">
                            <span title="Slide for Active/Deactive">
                                <mat-slide-toggle class="example-margin" formControlName="status"
                                   >
                                </mat-slide-toggle>
                            </span>
                        </div>
                        
                    </div> -->
                </div>

                <div class="col-4">
                    <label class="px-3 control-label">
                        Image
                        <span class="text-danger">*</span>
                    </label>
                    <div class="col-sm-12">
                        <input 
                            type="file" 
                            accept=".jpeg,.png,.jpg" 
                            (change)="onFileSelected($event)" 
                            />
                            <img *ngIf="vehicleImage" class="rounded imgStyle" [src]="vehicleImage" alt="">
                    </div>
                </div>
                
            </div>
            <div class="saveButton">
                <button type="submit" class="btnStyle save-btn"> {{saveTextName}}</button>
                <button type="button" class=" btnStyle ml-2" (click)="onCancel()"> Cancel </button>
            </div>
        </form>
    </div>
</div>



<div class="col-12 row">
        <div class="heading col-6">
            <p>Vehicle List</p>
        </div>
        <div class="form-group mb-0 col-sm-6 col-6 p-0 float-right has-search d-flex justify-content-end">
            <div class="col-6 pt-3">
                <span class="fa fa-search form-control-feedback"></span>
                <input class="form-control" type="text" name="Search" [(ngModel)]="searchText"
                    autocomplete="off" placeholder="Search">
            </div>
            
        </div>

    </div>

<div class="entireScreen">
    <div class="wrapper1" id="notifications-list" (scroll)="scrollTwo.scrollLeft = scrollOne.scrollLeft" #scrollOne >
        <div class="div1"></div>
   </div>
    <div class="wrapper2" #scrollTwo (scroll)="scrollOne.scrollLeft = scrollTwo.scrollLeft">
        <div *ngIf="!editForm" class="div2 invisible-scrollbar">
            <div class="table-responsive">
                <table class="table table-borderless table-striped table-hover" matSort >
                    <thead>
                        <tr class="p-2">
                        <th scope="col" class="text-left text-nowrap" *ngFor="let header of displayColumn" mat-sort-header="{{header}}">
                            {{ header }}
                        </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngIf="searchSpin">
                            <td colspan="12">
                                <mat-spinner [diameter]="30" style="margin:0 auto;"
                                    mode="indeterminate"></mat-spinner>
                            </td>
                        </tr>
                        <tr *ngIf="!searchSpin && !vehicleMasterDataList.length">
                            <td colspan="11">
                                <h4 class="text-muted text-center">
                                    No Data Found!
                                </h4>
                            </td>
                        </tr>
                        <tr *ngFor="let item of vehicleMasterDataList| filter: searchText| slice: (page - 1) * pageSize : (page - 1) * pageSize + pageSize; let i=index">
                                <td class="text-left text-muted">{{'#' + (i+1) }}</td>
                                <td class="text-left text-muted">
                                    <span title="Slide for Active/Deactive">
                                        <mat-slide-toggle class="example-margin" [(ngModel)]="item.status" (change)="onStatusChange($event, item.id)"
                                        >
                                        </mat-slide-toggle>
                                    </span>
                                </td>
                                <td class="text-left">{{ item.vehicle_name }}</td>
                                <td class="text-left">{{ item.vehicle_type_name }}</td>
                                <td class="text-left">{{ item.max_capacity }}</td>
                                <td class="text-left">{{ item.ride_type }}</td>
                                <td class="text-left">{{ item.ratings }}</td>
                                <td class="text-left">
                                    <img class="rounded imgStyle" [src]="getImage(item.image)" alt="">
                                </td>
                                
                                <td class="text-left buttontdsize">
                                    <button class="btn btn-sm btn-primary mr-1" (click)="onEditVehicleType(item)">{{'Edit'}}
                                    </button>
                                    <button class="btn btn-sm btn-primary mr-1" (click)="onDeletedRecord(item.id)"> {{'Delete'}}  </button>
                                </td>
                        </tr>
                    </tbody>
                </table>
                <div class="card-footer pb-0">
                    <div class="d-flex w-100 justify-content-between">
                        <ngb-pagination [collectionSize]="collectionSize" [(page)]="page" [maxSize]="5" [pageSize]="pageSize">
                        </ngb-pagination>
                        <select class="custom-select" style="width: auto" name="pageSize" [(ngModel)]="pageSize">
                            <option [ngValue]="20">20 items per page</option>
                            <option [ngValue]="50">50 items per page</option>
                            <option [ngValue]="100">100 items per page</option>
                            <option [ngValue]="150">150 items per page</option>
                            <option [ngValue]="200">200 items per page</option>
                            <option [ngValue]="500">500 items per page</option>
                            <option [ngValue]="700">700 items per page</option>
                            <option [ngValue]="1000">1000 items per page</option>
                        </select>
                    </div>
                </div>
            </div>
            </div>
    </div>
</div>

  <ngx-loading [show]="loading"
  [config]="{primaryColour: primaryColour, secondaryColour: secondaryColour, tertiaryColour: primaryColour, backdropBorderRadius: '3px',fullScreenBackdrop:true}"
  [template]="loadingTemplate"></ngx-loading>
