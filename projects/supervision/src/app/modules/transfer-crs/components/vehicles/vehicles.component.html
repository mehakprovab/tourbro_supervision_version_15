<div class="row mx-0 pt-2">
    <div class="col-md-12">
        <div class="card main-card mb-6">
            <div class="card-body">
                <ngb-tabset class="tabs-animated custom_tab" (tabChange)="beforeChange($event)" #tabs
                [activeId]="activeIdString">
                    <ngb-tab id="list_vehicles">
                        <ng-template ngbTabTitle>
                            <span class="">{{'Route List'}}</span>
                        </ng-template>
                        <ng-template ngbTabContent>
                            <app-vehicle-list (toUpdate)="triggerTab($event)"></app-vehicle-list>
                        </ng-template>
                    </ngb-tab>
                    <ngb-tab id="add_vehicles">
                        <ng-template ngbTabTitle>
                            <span class="">{{'Add/Edit Route'}}</span>
                        </ng-template>
                        <ng-template ngbTabContent>
                            <app-add-vehicle (someEvent)="triggerTab($event)"></app-add-vehicle>
                        </ng-template>
                    </ngb-tab>
                </ngb-tabset>
            </div>
        </div>
    </div>
</div>
