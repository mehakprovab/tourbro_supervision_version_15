<div class="sub-agent-container custom-table-layout card" style="padding: 20px;">
    <div class="add-traveller">
        <div class="custom-inline-form">

            <!-- <div class="register-form-fields"> -->
                <form autocomplete="off" class="needs-validation" [formGroup]="registerForm" novalidate>


                    <section class="section1">
                        <header>
                            <div class="bead"><span>1</span></div> <span *ngIf="supplier_type == 7"> DMC </span> <span *ngIf="supplier_type !=7"> AGENCY </span>&nbsp;  MANAGER DETAILS(PRIME ADMIN DETAILS)
                        </header>
                        <div class="content form-row">
                            <div class="col-md-2">
                                <fieldset class="form-group">
                                    <label for="firstName" class="required">Title</label>
                                    <div tabindex="-1" role="group">
                                        <select id="inputState" class="form-control capitalize"
                                            formControlName="title">
                                            <option selected value="" disabled>Select</option>
                                            <option *ngFor="let t of userTitleList" value="{{t.id}}">
                                                {{t.title}}</option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>
                            <div class="col-md-4">
                                <fieldset class="form-group">
                                    <label for="firstName" class="required">First Name</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="first_name" id="firstName" type="text"
                                            (keypress)="omitSpecialCharacters($event)" placeholder="First Name"
                                            class="form-control">
                                    </div>
                                </fieldset>
                            </div>
                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="lastName" class="required">Last Name</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="last_name" type="text" placeholder="Last Name"
                                            (keypress)="omitSpecialCharacters($event)" class="form-control"
                                            formControlName="last_name">
                                    </div>
                                </fieldset>
                            </div>
                            <div class="col-md-2">
                                <fieldset class="form-group">
                                    <label for="lastName" class="required">Phone Code</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="PhoneCode" class="form-control">
                                            <option value='' disabled>Phone Code</option>
                                            <option [ngValue]="p.phone_code" *ngFor="let p of phoneCodeList">
                                                {{p.name}} ({{ p.phone_code }})
                                            </option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-4">
                                <fieldset class="form-group">
                                    <label for="phone" class="required">Phone Number</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="phone" type="text" placeholder="Phone"
                                            class="form-control" (keypress)="numberOnly($event)">

                                                <!-- <ngx-intl-tel-input 
                                                [cssClass]="'custom'" 
                                                [preferredCountries]="preferredCountries"
                                                [enableAutoCountrySelect]="false" 
                                                [enablePlaceholder]="true" 
                                                [searchCountryFlag]="true"
                                                [searchCountryField]="[SearchCountryField.Iso2, SearchCountryField.Name]"
                                                [selectFirstCountry]="false" 
                                                [selectedCountryISO]="CountryISO.Qatar"
                                                [maxLength]="15" 
                                                [tooltipField]="TooltipLabel.Name" 
                                                [phoneValidation]="true" 
                                                [separateDialCode]="false"
                                                name="phone" formControlName="phone">
                                                </ngx-intl-tel-input> -->

                                    </div>
                                </fieldset>
                            </div>
                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="email" class="required">Email</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="email" type="email" placeholder="Email Id"
                                            class="form-control">
                                    </div>
                                </fieldset>
                            </div>
                            <!-- <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="business_phone" class="required">Business Phone</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="business_phone" type="text" placeholder="Email Id"
                                            class="form-control" (keypress)="numberOnly($event)">
                                    </div>
                                </fieldset>
                            </div> -->
                        </div>
                    </section>

                    <section class="section2">
                        <header>
                            <div class="bead"><span>2</span></div><span *ngIf="supplier_type == 7"> DMC </span> <span *ngIf="supplier_type !=7"> AGENCY </span>&nbsp; DETAILS
                        </header>
                        <div class="content form-row">


                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessName" class="required"> Registered Legal Name</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="business_name" type="text"
                                            placeholder="Registered Legal Name" class="form-control">
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessName" class="required"> Company Trade Name</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="business_trade_name" type="text"
                                            placeholder="Company Trade Name" class="form-control">
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">  
                                <fieldset class="form-group">
                                    <label for="businessName"> Chain Name - if operationg under chain</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="business_chain_name" type="text"
                                            placeholder="Chain Name -if operating under chain"
                                            class="form-control">
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessName"> Company Website</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="business_website" type="text"
                                            placeholder="Company Website" class="form-control">
                                    </div>
                                </fieldset>
                            </div>



                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessName" class="required"> Registration Number</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="registration_number" type="text"
                                            placeholder="Registration Number" class="form-control">
                                    </div>
                                </fieldset>
                            </div>


                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessNumber" class="required">Country Of Registration</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="country_of_registartion" class="form-control">
                                            <option value='' disabled>Country Of Registration</option>
                                            <option *ngFor="let c of registerCountries" [ngValue]="c.name">
                                                {{c.name}}</option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessName" class="required"> Tax Registration Number</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="tax_reg_no" type="text"
                                            placeholder="Tax Registration Number" class="form-control">
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessNumber">License (IATA/ABTA/ATOL, ..etc)</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="affiliations"
                                            class="form-control text-capitalize" id="affiliations"
                                            (change)="onSelect($event.target.value)">
                                            <option value="">Select License</option>
                                            <option [value]="reqType.name" *ngFor="let reqType of requestTypes">
                                                {{ reqType.name }}
                                            </option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6" *ngIf="showAffiliationNumber">
                                <fieldset class="form-group">
                                    <label for="affiliation_number" class="required">Affiliation Number</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="affiliation_number" type="text"
                                            class="form-control text-capitalize" id="amount"
                                            placeholder="Affiliation Number" maxlength="12"
                                            (keypress)="numbersOnly($event)" />
                                    </div>
                                </fieldset>
                            </div>


                            <div class="col-md-6" *ngIf="supplier_type != 7">
                                <fieldset class="form-group">
                                    <label for="businessNumber" class="required">Form Of Payment
                                        Prefernce</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="payment_pref" class="form-control">
                                            <option value='' disabled>Select Payment Prefernce</option>
                                            <option value='Prepaid Balance'>Prepaid Balance</option>
                                            <option value='Credit Card'>Credit Card</option>
                                            <option value='Prepaid Balance / Credit Card'> (Prepaid Balance /
                                                Credit Card) Both</option>

                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="businessNumber" class="required">Currency</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="currency" class="form-control">
                                            <option value='' disabled>Select Currency</option>
                                            <option *ngFor="let c of currencyList" [value]="c.currency">
                                                {{c.currency}}</option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-2">
                                <fieldset class="form-group">
                                    <label for="lastName" class="required">Phone Code</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="alterPhoneCode" class="form-control">
                                            <option value='' disabled>Phone Code</option>
                                            <option [ngValue]="p.phone_code" *ngFor="let p of phoneCodeList">
                                                {{p.name}} ({{ p.phone_code }})
                                            </option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-4">
                                <fieldset class="form-group">
                                    <label for="phone" class="required">Office Phone Number</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="office_number" type="text"
                                            placeholder="Office Number" class="form-control" (keypress)="numberOnly($event)"> 

                                            <!-- <ngx-intl-tel-input 
                                                [cssClass]="'custom'" 
                                                [preferredCountries]="preferredCountries"
                                                [enableAutoCountrySelect]="false" 
                                                [enablePlaceholder]="true" 
                                                [searchCountryFlag]="true"
                                                [searchCountryField]="[SearchCountryField.Iso2, SearchCountryField.Name]"
                                                [selectFirstCountry]="false" 
                                                [selectedCountryISO]="CountryISO.Qatar"
                                                [maxLength]="15" 
                                                [tooltipField]="TooltipLabel.Name" 
                                                [phoneValidation]="true" 
                                                [separateDialCode]="false"
                                                name="office_number" formControlName="office_number">
                                                </ngx-intl-tel-input> -->
                                    </div>
                                </fieldset>
                            </div>

                            <!-- <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="email" class="required">Alternative company Email ID</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="office_number" type="email"
                                            placeholder="Office Number" class="form-control"
                                            (keypress)="numberOnly($event)">
                                    </div>
                                </fieldset>
                            </div> -->

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="email" class="required">Alternative Company Email Id</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="alter_email" type="email"
                                            placeholder="Alternative Company Email Id" class="form-control">
                                    </div>
                                </fieldset>
                            </div>

                        </div>
                    </section>

                    <section>
                        <header>
                            <div class="bead"><span>3</span></div><span *ngIf="supplier_type == 7"> DMC </span> <span *ngIf="supplier_type !=7"> AGENCY </span>&nbsp; ADDRESS (MAILING ADDRESS)
                        </header>

                        <div class="content row">


                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName" class="required">Address Line1 (Building number, Street)</label>

                                    <input type="text" formControlName="address1"
                                        placeholder="Address Line 1 (Building number, Street, Area, ...etc)"
                                        class="form-control text-capitalize" id="firstName" maxlength="250">

                                </div>
                            </div>


                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">Address line 2</label>

                                    <input type="text" formControlName="address2"
                                        class="form-control text-capitalize" id="firstName" maxlength="250">

                                </div>
                            </div>


                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="selectCountry" class="required">Select Country</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="country" class="form-control"
                                            (change)="onCountryChange($event)">
                                            <option value="">Select Country</option>
                                            <option *ngFor="let country of registerCountries"
                                                [value]="country.sortname">{{ country.name }}</option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="selectState" class="required">Select State</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="state" class="form-control"
                                            (change)="onStateChange($event)">
                                            <option value="">Select State</option>
                                            <option *ngFor="let state of registerStates" [value]="state.id">{{
                                                state.name }}</option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="cityInput" class="required">City</label>
                                    <input type="text" formControlName="city" placeholder="City"
                                        class="form-control text-capitalize" id="cityInput"
                                        (input)="filterCities($event.target.value)" [attr.list]="'city-list'"
                                        maxlength="250" />
                                    <datalist id="city-list">
                                        <option *ngFor="let city of filteredCities" [value]="city.name">
                                        </option>
                                    </datalist>
                                </div>
                            </div>


                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName" class="required">Zip/Postal Code</label>

                                    <input type="text" formControlName="zip_code"
                                        placeholder="Zip / Postal Code" class="form-control text-capitalize"
                                        id="firstName">

                                </div>
                            </div>

                        </div>
                    </section>


                    <section>
                        <header>
                            <div class="bead"><span>4</span></div><span *ngIf="supplier_type == 7"> DMC </span> <span *ngIf="supplier_type !=7"> AGENCY </span>&nbsp; ACCOUNTING DETAILS
                        </header>

                        <div class="content form-row">

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName" class="required">Accounting Email ID</label>

                                    <input type="text" formControlName="acc_email"
                                        class="form-control text-capitalize" id="firstName"
                                        placeholder="Accounting Email Id" type="text">

                                </div>
                            </div>

                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="email" class="required">Accounting Tel. Number</label>
                                    <div tabindex="-1" role="group">
                                        <input formControlName="acc_tel_no" type="email"
                                            placeholder="Accounting Tel. Number" class="form-control"
                                            (keypress)="numberOnly($event)">
                                    </div>
                                </fieldset>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">Bank Name</label>

                                    <input type="text" formControlName="bank_name"
                                        class="form-control text-capitalize" id="firstName"
                                        placeholder="Bank Name">

                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">Bank Branch Address</label>

                                    <input type="text" formControlName="branch_addrs"
                                        class="form-control text-capitalize" id="firstName"
                                        placeholder="Bank Branch Address">

                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">Bank Account Holder Name </label>

                                    <input type="text" formControlName="acc_holder_name"
                                        class="form-control text-capitalize" id="firstName"
                                        placeholder="Bank Account Holder Name">

                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">Account Number </label>

                                    <input type="text" formControlName="acc_number"
                                        class="form-control text-capitalize" id="firstName"
                                        placeholder="Account Number" (keypress)="numberOnly($event)">

                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">IBAN </label>

                                    <input type="text" formControlName="iban"
                                        class="form-control text-capitalize" id="firstName" placeholder="IBAN">

                                </div>
                            </div>


                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">Swift Code </label>

                                    <input type="text" formControlName="swift_code"
                                        class="form-control text-capitalize" id="firstName"
                                        placeholder="Swift Code">

                                </div>
                            </div>

                        </div>
                    </section>

                    <section  *ngIf="supplier_type === 7">
                        <header>
                            <div class="bead"><span>5</span></div><span> DMC </span> &nbsp; Services
                        </header>

                        <div class="content form-row">
                            <div class="col-sm-2 col-lg-3 supplier-buttons">
                                <label class="form-check-label" >
                                    <a class="c-pointer">
                                        <button type="button" class="btn supplier" (click)="onSupplierSelect('HS')"
                                            > Hotel Supplier</button>
                                    </a>
                                </label>
                                <input [ngModelOptions]="{standalone: true}" class="supplier-select-check" [(ngModel)]="hsSelect"  (change)="onSupplierCheckboxChange('HS', $event)" type="checkbox" />
                            </div>

                            <div class="col-sm-2 col-lg-3 supplier-buttons">
                                <label class="form-check-label" >
                                    <a class="c-pointer">
                                        <button type="button" class="btn supplier" (click)="onSupplierSelect('AS')"
                                            > Activity Supplier</button>
                                    </a>
                                </label>
                                <input [ngModelOptions]="{standalone: true}" class="supplier-select-check" [(ngModel)]="asSelect"  (change)="onSupplierCheckboxChange('AS', $event)" type="checkbox" />
                            </div>
                            <div class="col-sm-2 col-lg-3 supplier-buttons">
                                <label class="form-check-label" >
                                    <a class="c-pointer">
                                        <button type="button" class="btn supplier" (click)="onSupplierSelect('TS')"
                                            > Transfer Supplier</button>
                                    </a>
                                </label>
                                <input [ngModelOptions]="{standalone: true}" class="supplier-select-check" [(ngModel)]="tsSelect"  (change)="onSupplierCheckboxChange('TS', $event)" type="checkbox" />
                            </div>
                            <div class="col-sm-3 col-lg-3 supplier-buttons">
                                <label class="form-check-label" >
                                    <a class="c-pointer">
                                        <button type="button" class="btn supplier" (click)="onSupplierSelect('HPS')"
                                            >Holiday Package Supplier</button>
                                    </a>
                                </label>
                                <input [ngModelOptions]="{standalone: true}" class="supplier-select-check" [(ngModel)]="hpsSelect"  (change)="onSupplierCheckboxChange('HPS', $event)" type="checkbox" />
                            </div>
                        </div>
                    </section>

                    <section  *ngIf="supplier_type === 7">
                        <header>
                            <div class="bead"><span>6</span></div><span> Distribution </span> &nbsp; Channel
                        </header>
                         <div class="content form-row">
                            <div class="col-sm-4 d-flex align-items-center">
                                <div class="col-auto">
                                    <label>
                                        <input type="radio" value="B2C" formControlName="supplier_type">
                                        <span class="design"></span>
                                        <span class="text" style="margin-left: 4px;">B2C</span>
                                    </label>
                                </div>
                                <div class="col-auto">
                                    <label>
                                        <input type="radio" value="B2B" formControlName="supplier_type">
                                        <span class="design"></span>
                                        <span class="text" style="margin-left: 4px;">B2B</span>
                                    </label>
                                </div>
                                <div class="col-auto">
                                    <label>
                                        <input type="radio" value="B2C,B2B" formControlName="supplier_type">
                                        <span class="design"></span>
                                        <span class="text" style="margin-left: 4px;">Both</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </section>

                        <header>
                            <div class="bead"><span>7</span></div><span > Select </span> &nbsp; Currency
                        </header>
                        <div class="content form-row">
                            <div class="col-md-6">
                                <fieldset class="form-group">
                                    <label for="selectCurrency" class="required">Select Currency</label>
                                    <div tabindex="-1" role="group">
                                        <select formControlName="supplierCurrency" class="form-control"

                                            <option *ngFor="let state of currencyList" [value]="state.currency">{{
                                                state.currency }}</option>
                                        </select>
                                    </div>
                                </fieldset>
                            </div>
                        </div>
                    </section> -->
