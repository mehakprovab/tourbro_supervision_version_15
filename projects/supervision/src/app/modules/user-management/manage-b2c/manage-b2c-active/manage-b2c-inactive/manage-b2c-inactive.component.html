<div class="">
    <div class="">
        <ul
            ngbNav
            #tabs="ngbNav"
            class="nav-tabs tabs-animated custom_tab"
            [activeId]="activeIdString"
            (navChange)="beforeChange(false)"
        >
            <li [ngbNavItem]="'add_update_b2cUser'">
                <a ngbNavLink>Create/Update B2C User</a>
                <ng-template ngbNavContent>
                    <app-create-b2c
                        (b2cUserUpdate)="triggerTab($event)">
                    </app-create-b2c>
                </ng-template>
            </li>

            <li [ngbNavItem]="'b2cUsers_list'">
                <a ngbNavLink>B2C Users List</a>
                <ng-template ngbNavContent>
                    <app-inactive-list
                        (b2cUserUpdate)="triggerTab($event)">
                    </app-inactive-list>
                </ng-template>
            </li>
        </ul>

        <div [ngbNavOutlet]="tabs"></div>
    </div>
</div>
