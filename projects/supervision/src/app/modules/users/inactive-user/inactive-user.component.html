<div class="row">
  <div class="col-md-12">
    <div class="card main-card mb-6">
      <div class="card-body">

        <ul
          ngbNav
          #tabs="ngbNav"
          [(activeId)]="activeId"
          (navChange)="beforeChange($event)"
          class="nav-tabs">

          <li [ngbNavItem]="'list_users'">
            <a ngbNavLink>List User</a>
            <ng-template ngbNavContent>
              <app-inactive-user-list
                (toUpdate)="triggerTab($event)">
              </app-inactive-user-list>
            </ng-template>
          </li>

          <li [ngbNavItem]="'add_user'">
            <a ngbNavLink>Add/Edit User</a>
            <ng-template ngbNavContent>
              <app-inactive-add-edit
                (someEvent)="triggerTab($event)"
                [userOne]="userData">
              </app-inactive-add-edit>
            </ng-template>
          </li>

        </ul>

        <div [ngbNavOutlet]="tabs" class="mt-3"></div>

      </div>
    </div>
  </div>
</div>
