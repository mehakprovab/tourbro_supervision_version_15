<ul ngbNav #tabs="ngbNav" class="tabs-animated custom_tab crs-tab-ui" [(activeId)]="activeIdString" (navChange)="onTabSelected($event)">

  <!-- Tab 1 -->
  <li [ngbNavItem]="'list_package-type'">

    <a ngbNavLink>
      <span>Package Type List</span>
    </a>

    <ng-template ngbNavContent>
      <app-package-type-list></app-package-type-list>
      </ng-template>

  </li>

  <!-- Tab 2 -->
  <li [ngbNavItem]="'add_package-type'">

    <a ngbNavLink>
      <span>Add/ Edit Package Type</span>
    </a>

    <ng-template ngbNavContent>
      <app-add-update-package-type-list></app-add-update-package-type-list>
    </ng-template>
    
  </li> 

</ul>

<div [ngbNavOutlet]="tabs"></div>
