<div class="card adminInner">
    <div class="card-header">
        <h5>Add/ Edit Therapy</h5>
    </div>

    <form class="needs-validation pt-3" novalidate>
        <div class="card-body p-0">
            <fieldset>
                <div class="row">

                    <form [formGroup]="addUpdateTherapyListForm" class="w-100" (ngSubmit)="onSubmit()">
                        <div class="col-md-12 pr-0 mb-4">
                            <label class="control-label" for="hotel_type_name">
                                Therapy Type
                                <span class="text-danger">*</span>
                            </label>

                            <input type="text" id="therapy_type_name" name="therapy_type_name"
                                formControlName="therapy_name" placeholder="Add/ Edit Therapy Type" class="form-control"
                                required />

                            <div class="invalid-feedback">
                                <small *ngIf="submitted && addUpdateTherapyListForm.get('therapy_name').invalid">
                                    Add/ Edit Therapy Type is required
                                </small>
                            </div>
                        </div>


                        <!-- Status -->
                        <div class="col-md-12">
                            <label class="control-label">
                                Status
                                <span class="text-danger">*</span>
                            </label>


                            <label class="switch">
                                <input type="checkbox" name="status" formControlName="status">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <!-- Buttons -->
                        <div class="col-md-12 mt-4">
                            <button type="submit" class="btn btn-primary">Save</button>
                            &nbsp;&nbsp;
                            <button type="reset" class="btn btn-secondary"
                                (click)="addUpdateTherapyListForm.reset()">Reset</button>
                        </div>
                    </form>

                </div>
            </fieldset>
        </div>
    </form>
</div>
