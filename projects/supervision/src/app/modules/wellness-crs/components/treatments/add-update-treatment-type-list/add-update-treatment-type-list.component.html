<div class="card adminInner">
    <div class="card-header">
        <h5>Add/ Edit Treatment</h5>
    </div>

    <form class="needs-validation pt-3" novalidate>
        <div class="card-body p-0">
            <fieldset>
                <div class="row">

                   <form [formGroup]="addUpdateTreatmentTypeListForm" class="w-100"
                     (ngSubmit)="onSubmit()">
                    <div class="col-md-12 pr-0 mb-4">
                        <label class="control-label" for="hotel_type_name">
                           Therapy Type
                            <span class="text-danger">*</span>
                        </label>

                        <!-- <input type="text" 
                            id="therapy_type_name"
                            name="therapy_type_name"
                            formControlName="therapy_name"
                            placeholder="Add/ Edit Therapy Type"
                            class="form-control"
                            required /> -->
                            <!-- <ng-multiselect-dropdown formControlName="therapy_name" [placeholder]="'Select Therapy Type'"
                    [data]="therapyList" [settings]="dropdownSettingsForTherapy" class="form-control meal-plan-dropdown">
                </ng-multiselect-dropdown> -->

                <select formControlName="therapy_name" class="form-control">
                    <option value="" disabled selected>Select Therapy</option>
                    <option *ngFor="let coreCountry of therapyList" [ngValue]="coreCountry.therapy_name">
                        {{ coreCountry.therapy_name }}
                    </option>
                </select>

                        <div class="invalid-feedback">
                            <small *ngIf="addUpdateTreatmentTypeListForm.get('therapy_name').invalid && submitted">
                              Add/ Edit Therapy Type is required
                            </small>
                        </div>
                    </div>
                    
                    <div class="col-md-12 pr-0 mb-4">
                        <label class="control-label" for="hotel_type_name">
                           Treatment Type
                            <span class="text-danger">*</span>
                        </label>

                        <input type="text" 
                            id="treatment_type_name"
                            name="treatment_type_name"
                            formControlName="treatment_name"
                            placeholder="Add/ Edit Treatment Type"
                            class="form-control"
                            required />

                        <div class="invalid-feedback">
                            <small *ngIf="addUpdateTreatmentTypeListForm.get('treatment_name').invalid && submitted">
                              Add/ Edit Treatment Type is required
                            </small>
                        </div>
                    </div>

                    <div class="col-md-12 pr-0 mb-4">
                        <label class="control-label" for="description">
                           Description
                            <span class="text-danger">*</span>
                        </label>

                        <textarea
                            id="description"
                            name="description"
                            formControlName="description"
                            placeholder="Enter Description"
                            class="form-control"
                            rows="3"
                            required></textarea>

                        <div class="invalid-feedback">
                            <small *ngIf="addUpdateTreatmentTypeListForm.get('description').invalid && submitted">
                              Description is required
                            </small>
                        </div>
                    </div>

                    <div class="col-md-12 pr-0 mb-4">
                        <label class="control-label">
                           Treatment Image
                            <span class="text-danger" *ngIf="!isEdit">*</span>
                        </label>

                        <div class="mb-2" *ngIf="imageSrc">
                            <img [src]="imageSrc" height="80" width="120" class="rounded">
                        </div>

                        <input type="file"
                            accept=".jpeg,.jpg,.png,.svg,.webp"
                            class="form-control"
                            (change)="previewImage($event)" />

                        <small class="text-muted">
                            Only JPG, JPEG, PNG, SVG, and WEBP formats up to 500 KB are allowed.
                        </small>
                    </div>

                    <!-- Status -->
                   <div class="col-md-12">
                    <label class="control-label">
                        Status
                        <span class="text-danger">*</span>
                    </label>
                   

                    <label class="switch">
                        <input type="checkbox" name="status" formControlName="status">
                        <span class="slider round"></span>
                    </label>
                   </div>

                    <!-- Buttons -->
                    <div class="col-md-12 mt-4">
                        <button type="submit" class="btn btn-primary">Save</button>
                        &nbsp;&nbsp;
                        <button type="reset" class="btn btn-secondary" (click)="resetForm()">Reset</button>
                    </div>
                    </form>

                </div>
            </fieldset>
        </div>
    </form>
</div>
