<div class="footer-dots">
    <div class="btn-group" ngbDropdown autoClose="outside" placement="top-left">
        <button type="button" class="btn btn-link dot-btn-wrapper dropdown-toggle-no-caret" ngbDropdownToggle>
            <span>
                <i class="dot-btn-icon lnr-bullhorn icon-gradient bg-mean-fruit"></i>
                <div class="badge badge-dot badge-abs badge-dot-sm badge-danger">Notifications</div>
            </span>
        </button>
        <div class="dropdown-menu-xl" ngbDropdownMenu>
            <div class="dropdown-menu-header mb-0">
                <div class="dropdown-menu-header-inner bg-deep-blue">
                    <div class="menu-header-image opacity-1 dd-header-bg-2"></div>
                    <div class="menu-header-content text-dark">
                        <h5 class="menu-header-title">Notifications</h5>
                        <h6 class="menu-header-subtitle">You have <b>21</b> unread messages</h6>
                    </div>
                </div>
            </div>
            <div class="nav-justified">
                <div class="card-tabbed-header">
            <ul
    ngbNav
    #notificationNav="ngbNav"
    class="nav-tabs tabs-animated custom_tab nav-justified">

    <!-- Messages -->
    <li [ngbNavItem]="1">
        <a ngbNavLink>Messages</a>
        <ng-template ngbNavContent>

            <!-- Paste your entire Messages tab content here -->

        </ng-template>
    </li>

    <!-- Events -->
    <li [ngbNavItem]="2">
        <a ngbNavLink>Events</a>
        <ng-template ngbNavContent>

            <!-- Paste your entire Events tab content here -->

        </ng-template>
    </li>

    <!-- Status -->
    <li [ngbNavItem]="3">
        <a ngbNavLink>Status</a>
        <ng-template ngbNavContent>

            <div class="no-results">
                <div class="swal2-icon swal2-success swal2-animate-success-icon">
                    <div class="swal2-success-circular-line-left"
                        style="background-color: rgb(255, 255, 255);"></div>
                    <span class="swal2-success-line-tip"></span>
                    <span class="swal2-success-line-long"></span>
                    <div class="swal2-success-ring"></div>
                    <div class="swal2-success-fix"
                        style="background-color: rgb(255, 255, 255);">
                    </div>
                    <div class="swal2-success-circular-line-right"
                        style="background-color: rgb(255, 255, 255);">
                    </div>
                </div>

                <div class="results-subtitle">All caught up!</div>
                <div class="results-title">
                    There are no system errors!
                </div>
            </div>

        </ng-template>
    </li>

</ul>

<div [ngbNavOutlet]="notificationNav"></div>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item-divider nav-item mt-0"></li>
                    <li class="nav-item-btn text-center nav-item">
                        <button class="btn-shadow btn-wide btn-pill btn btn-focus btn-sm">View Latest Changes</button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="dots-separator"></div>
    <div class="btn-group" ngbDropdown autoClose="outside" placement="top-left">
        <button type="button" class="btn btn-link dot-btn-wrapper dropdown-toggle-no-caret" ngbDropdownToggle>
            <span>
                <i class="dot-btn-icon lnr-pie-chart icon-gradient bg-love-kiss"></i>
                <div class="badge badge-dot badge-abs badge-dot-sm badge-warning">Notifications</div>
            </span>
        </button>
        <div class="dropdown-menu-xl" ngbDropdownMenu>
            <div class="dropdown-menu-header">
                <div class="dropdown-menu-header-inner bg-premium-dark">
                    <div class="menu-header-image dd-header-bg-7"></div>
                    <div class="menu-header-content text-white">
                        <h5 class="menu-header-title">Users Online</h5>
                        <h6 class="menu-header-subtitle">Recent Account Activity Overview</h6>
                    </div>
                </div>
            </div>
            <div class="widget-chart">
                <div class="widget-chart-content">
                    <div class="icon-wrapper rounded-circle">
                        <div class="icon-wrapper-bg opacity-9 bg-focus"></div>
                        <i class="lnr-users text-white"></i>
                    </div>
                    <div class="widget-numbers"><span>344k</span></div>
                    <div class="widget-subheading pt-2">Profile views since last login</div>
                </div>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item-divider mt-0 nav-item"></li>
                <li class="nav-item-btn text-center nav-item">
                    <button class="btn-shine btn-wide btn-pill btn btn-warning btn-sm">
                    <fa-icon [icon]="faCog" animation="spin"></fa-icon>
                        Refresh List
                    </button>
                </li>
            </ul>
        </div>
    </div>
</div>
